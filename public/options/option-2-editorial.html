<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Option 2 — Cyberpunk Core</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --card-bg: #07050f;
      --panel: rgba(12,10,24,.78);
      --text: #eef2ff;
      --muted: #9ba5d2;
      --hot: #ff2bd6;
      --neon: #39e7ff;
      --violet: #8f6dff;
      --line-c: rgba(116,130,255,.34);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, sans-serif;
      color: var(--text);
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 15% 20%, rgba(143,109,255,.24) 0%, transparent 32%),
        radial-gradient(circle at 88% 82%, rgba(57,231,255,.18) 0%, transparent 30%),
        linear-gradient(145deg, #04020a 0%, #0b0718 50%, #04030a 100%);
    }

    .grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(57,231,255,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,43,214,.05) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle at center, black 34%, transparent 88%);
      pointer-events: none;
    }

    .shell {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: clamp(16px,4vw,56px);
      position: relative;
      width: 100%;
    }

    .card {
      width: min(820px,92vw);
      border: 1px solid var(--line-c);
      border-radius: 22px;
      background: var(--panel);
      backdrop-filter: blur(14px);
      padding: clamp(24px,4vw,40px);
      box-shadow:
        0 24px 90px rgba(0,0,0,.58),
        inset 0 0 26px rgba(143,109,255,.12),
        0 0 46px rgba(57,231,255,.12);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute; inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(120deg, rgba(255,43,214,.72), rgba(57,231,255,.62));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: .6;
    }

    h1 {
      margin: 0 0 12px;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(2rem,5.5vw,3.35rem);
      line-height: 1.06;
      letter-spacing: -.02em;
      background: linear-gradient(110deg, #f6f5ff 20%, #d5c9ff 56%, #88f0ff 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    /* presence: neon-purple label */
    .presence-label { color: #c4b8ff; }

    /* ask field: glassmorphic dark with neon glow on focus */
    .ask-field {
      background: rgba(6,8,18,.82);
      box-shadow: inset 0 0 18px rgba(143,109,255,.1);
    }
    .ask-field:focus-within {
      border-color: rgba(57,231,255,.65) !important;
      box-shadow: inset 0 0 18px rgba(143,109,255,.16), 0 0 26px rgba(57,231,255,.18);
    }

    /* submit: hot-pink → neon gradient */
    .ask-submit {
      background: linear-gradient(135deg, var(--hot), var(--neon)) !important;
      color: #070811 !important;
      font-family: "Space Grotesk", sans-serif;
      font-weight: 700;
      box-shadow: 0 0 18px rgba(255,43,214,.28), 0 0 20px rgba(57,231,255,.24);
    }

    /* >_ prefix glyph inside the field */
    .cyber-prefix {
      color: var(--neon); font-size: 13px; flex: none;
      padding-right: 8px; border-right: 1px solid rgba(57,231,255,.25); margin-right: 4px;
      font-family: "Space Grotesk", monospace; letter-spacing: 0;
    }
    .ask-ghost { left: 58px !important; }

    /* dock: glassmorphic dark panel */
    .dock-btn {
      background: rgba(12,10,24,.88) !important;
      border-color: rgba(116,130,255,.4) !important;
    }
  </style>
</head>
<body data-llm-design="composite">
  <div class="grid" aria-hidden="true"></div>

  <main class="shell">
    <section class="card" aria-label="Ask Oscar AI">

      <div class="presence">
        <span class="presence-dot" aria-hidden="true">
          <span class="presence-core"></span>
          <span class="presence-ring"></span>
        </span>
        <span class="presence-label">// OSCAR.FANELLI</span>
      </div>

      <h1>Do not panic.</h1>
      <p class="subhead">This machine utilizes the fundamental interconnectedness of my career to answer questions you didn't even know you had.</p>

      <form data-llm-form class="ask-field" autocomplete="off">
        <label class="sr-only" for="queryInput">Ask something about Oscar</label>
        <span class="cyber-prefix" aria-hidden="true">&gt;_</span>
        <input id="queryInput" class="ask-input" name="q" type="text" maxlength="500" aria-describedby="askGhost" />
        <span class="ask-ghost" id="askGhost" aria-hidden="true">
          <span class="ghost-text"></span>
          <span class="ask-caret"></span>
        </span>
        <button class="ask-submit" type="submit" aria-label="Ask">exec</button>
      </form>

    </section>
  </main>

  <div class="dock" aria-label="Page actions">
    <button class="dock-btn shuffle-btn" data-llm-shuffle type="button" aria-label="Shuffle to another style">
      <span class="shuffle-cards" aria-hidden="true"><i></i><i></i><i></i></span>
      <span class="dock-btn-text">Shuffle style</span>
    </button>
    <button class="dock-btn behind-trigger" data-llm-behind type="button">
      <span class="behind-q" aria-hidden="true">?</span>
      <span class="dock-btn-text">What's behind this?</span>
    </button>
  </div>

  <script src="../llm-hook.js"></script>
</body>
</html>

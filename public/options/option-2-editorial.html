<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Option 2 — Cyberpunk Core</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#07050f;
      --panel:rgba(12,10,24,.78);
      --text:#eef2ff;
      --muted:#9ba5d2;
      --line:rgba(116,130,255,.34);
      --hot:#ff2bd6;
      --neon:#39e7ff;
      --violet:#8f6dff;
    }

    * { box-sizing: border-box; }

    body {
      margin:0;
      min-height:100vh;
      font-family:Inter,sans-serif;
      color:var(--text);
      display:grid;
      place-items:center;
      overflow:hidden;
      background:
        radial-gradient(circle at 15% 20%, rgba(143,109,255,.24) 0%, transparent 32%),
        radial-gradient(circle at 88% 82%, rgba(57,231,255,.18) 0%, transparent 30%),
        linear-gradient(145deg, #04020a 0%, #0b0718 50%, #04030a 100%);
    }

    .grid {
      position:absolute;
      inset:0;
      background-image:
        linear-gradient(rgba(57,231,255,.06) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,43,214,.05) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle at center, black 34%, transparent 88%);
      pointer-events:none;
    }

    .card {
      width:min(820px,92vw);
      border:1px solid var(--line);
      border-radius:22px;
      background:var(--panel);
      backdrop-filter: blur(14px);
      padding: clamp(24px, 4vw, 40px);
      box-shadow:
        0 24px 90px rgba(0,0,0,.58),
        inset 0 0 26px rgba(143,109,255,.12),
        0 0 46px rgba(57,231,255,.12);
      position:relative;
      overflow:hidden;
    }

    .card::before {
      content:"";
      position:absolute;
      inset:0;
      border-radius:inherit;
      padding:1px;
      background: linear-gradient(120deg, rgba(255,43,214,.72), rgba(57,231,255,.62));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events:none;
      opacity:.6;
    }

    .k {
      margin:0 0 10px;
      font-family:"Space Grotesk",sans-serif;
      letter-spacing:.14em;
      text-transform:uppercase;
      font-size:.74rem;
      color:#c4b8ff;
      text-shadow:0 0 12px rgba(143,109,255,.38);
    }

    h1 {
      margin:0;
      font-family:"Space Grotesk",sans-serif;
      font-size:clamp(2rem,5.5vw,3.35rem);
      line-height:1.06;
      letter-spacing:-.02em;
      background: linear-gradient(110deg, #f6f5ff 20%, #d5c9ff 56%, #88f0ff 100%);
      -webkit-background-clip:text;
      background-clip:text;
      color:transparent;
      text-shadow:0 0 24px rgba(143,109,255,.26);
      max-width: 18ch;
    }

    .desc {
      margin:14px 0 22px;
      color:var(--muted);
      max-width:54ch;
      line-height:1.52;
    }

    .form {
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      border:1px solid var(--line);
      border-radius:14px;
      padding:8px;
      background:rgba(6,8,18,.82);
      box-shadow: inset 0 0 18px rgba(143,109,255,.1);
    }

    .form:focus-within {
      border-color: rgba(57,231,255,.65);
      box-shadow: inset 0 0 18px rgba(143,109,255,.16), 0 0 26px rgba(57,231,255,.18);
    }

    input {
      border:0;
      outline:0;
      background:transparent;
      color:var(--text);
      font-size:1.02rem;
      padding:11px 12px;
    }

    input::placeholder { color:#7380b8; }

    button {
      border:0;
      border-radius:10px;
      padding:10px 15px;
      font-family:"Space Grotesk",sans-serif;
      font-weight:700;
      letter-spacing:.01em;
      color:#070811;
      background: linear-gradient(135deg, var(--hot), var(--neon));
      box-shadow: 0 0 18px rgba(255,43,214,.28), 0 0 20px rgba(57,231,255,.24);
      cursor:pointer;
      opacity:0;
      transform:translateX(8px);
      pointer-events:none;
      transition:all .22s ease;
    }

    button.show { opacity:1; transform:translateX(0); pointer-events:auto; }

    .footer {
      margin-top:16px;
      font-size:.74rem;
      letter-spacing:.11em;
      text-transform:uppercase;
      color:#7f88b0;
    }
  
.style-shuffle{position:fixed;top:14px;right:14px;z-index:9999;font-size:.72rem;line-height:1;text-decoration:none;padding:6px 9px;border:1px solid currentColor;border-radius:999px;color:inherit;background:rgba(255,255,255,.08);opacity:.75;backdrop-filter:blur(2px)}
.style-shuffle:hover{opacity:1}
</style>
</head>
<body>
  <div class="grid" aria-hidden="true"></div>

  <main class="card">
    <p class="k">I’m Oscar Fanelli</p>
    <h1>What do you want to know about me?</h1>
    <p class="desc">A query-first portfolio: no scrolling deck, just signal. Ask and get answers from curated personal context.</p>

    <form data-llm-form class="form" id="f2">
      <input id="q2" placeholder="Ask about projects, AI work, product strategy..." />
      <button id="b2" type="submit">Search</button>
    </form>

    <div class="footer">Option 2 / Cyberpunk Core</div>
  </main>

  <a class="style-shuffle" href="../index.html" target="_top" aria-label="Shuffle style">shuffle style</a>

<script src="llm-hook.js"></script>
</body>
</html>

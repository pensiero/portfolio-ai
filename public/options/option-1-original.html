<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Option 1 — Original Prototype</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      .style-shuffle {
        position: fixed;
        top: 14px;
        right: 14px;
        z-index: 9999;
        font-size: 0.72rem;
        line-height: 1;
        text-decoration: none;
        padding: 6px 9px;
        border: 1px solid currentColor;
        border-radius: 999px;
        color: inherit;
        background: rgba(255, 255, 255, 0.7);
        opacity: 0.75;
      }
      .style-shuffle:hover { opacity: 1; }
    </style>
  </head>
  <body>
    <a class="style-shuffle" href="../index.html" target="_top" aria-label="Shuffle style">shuffle style</a>
    <main class="shell">
      <div class="orb orb-a" aria-hidden="true"></div>
      <div class="orb orb-b" aria-hidden="true"></div>

      <section class="search-card" aria-label="AI portfolio search">
        <p class="kicker">I’m Oscar Fanelli</p>
        <h1>What do you want to know about me?</h1>
        <p class="hint" id="hintText">Try: “What can you build?”</p>

        <form data-llm-form id="searchForm" class="search-form" autocomplete="off">
          <label class="sr-only" for="queryInput">Ask something about Oscar</label>
          <input
            id="queryInput"
            name="q"
            type="text"
            placeholder="Ask anything about my work, skills, ideas..."
            maxlength="240"
          />
          <button id="submitBtn" type="submit" aria-label="Submit search">Ask</button>
        </form>

        <div id="result" class="result" hidden>
          <p class="result-label">Answer</p>
          <p id="resultText"></p>
        </div>
      </section>
    </main>

    <script src="../llm-hook.js"></script>
</body>
</html>

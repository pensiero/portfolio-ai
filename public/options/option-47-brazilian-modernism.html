<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Option 47 — Brazilian Modernism</title>
  <style>
    :root { --card-bg: #ffffff; }

    * { box-sizing: border-box; }

    body {
      margin: 0; min-height: 100vh;
      display: grid; place-items: center;
      background: #f3f7eb; color: #1b2b1d;
      font-family: Inter, sans-serif; padding: 24px;
    }

    /* Niemeyer-inspired card with tropical offset shadow */
    .card {
      width: min(760px,100%);
      background: #fff;
      border: 2px solid #1b2b1d;
      padding: 26px;
      box-shadow: 14px 14px 0 #cde07a;
    }

    h1 {
      font-size: clamp(2rem,5vw,3rem);
      line-height: 1; margin: 0 0 12px;
    }

    /* presence: tropical forest green label */
    .presence-label { color: #45624a; }

    /* ask field: structural modernist border */
    .ask-field {
      border: 2px solid #1b2b1d !important;
      border-radius: 0 !important;
    }
    .ask-field:focus-within { box-shadow: 4px 4px 0 #cde07a; }

    /* submit: dark forest */
    .ask-submit {
      background: #1b2b1d !important;
      color: #fff !important;
      border-radius: 0 !important;
      font-weight: 600;
    }
    .ask-submit:hover { background: #2a3f2c !important; }

    /* ── Harmonized conversation (Niemeyer) ───────────────────────────
       Structural forest frames with a tropical-lime offset and rule.
       Scoped under `.card` to win over the renderer's rounded greys. */
    .card:has(.thread) h1 { font-size: clamp(1.5rem, 4vw, 2.2rem); }
    .card:has(.thread) .subhead { display: none; }

    .card .popular-label, .card .answer-label, .card .you-label { color: #45624a; letter-spacing: .16em; }
    .card .popular-rule, .card .convo-rule { background: #1b2b1d; }

    .card .chip { border-radius: 0; border: 1.5px solid #1b2b1d; background: transparent; color: #1b2b1d; }
    .card .chip:hover { background: #eef4dd; }

    .card .you-bubble { background: #fff; border: 2px solid #1b2b1d; border-radius: 0; color: #1b2b1d; box-shadow: 4px 4px 0 #cde07a; }

    .card .answer { background: #f6f9ef; border: 2px solid #1b2b1d; border-radius: 0; }
    .card .answer.is-plain { background: transparent; border-color: transparent; }
    .card .answer-rule, .card .answer-shimmer { top: 0; bottom: 0; width: 6px; border-radius: 0; opacity: 1; background: #cde07a; }
    .card .answer-source { color: #45624a; }
    .card .confidence-tag { border-top: 2px solid rgba(27,43,29,.16); color: #45624a; }
    .card .confidence-pct { color: #1b2b1d; }

    .card .dotwave span { background: #1b2b1d; }
    .card .status-text { color: #45624a; }
    .card .skeleton-line {
      border-radius: 0;
      background: linear-gradient(90deg, rgba(27,43,29,.05) 25%, rgba(205,224,122,.50) 50%, rgba(27,43,29,.05) 75%);
      background-size: 200% 100%;
    }

    .card .footer { border-top: 2px solid rgba(27,43,29,.14); }
    .card .footer a, .card .clear-btn { color: #1b2b1d; }
  </style>
</head>
<body data-llm-design="composite">
  <main style="display:grid;place-items:center;min-height:100dvh;padding:24px;width:100%">
    <section class="card" aria-label="Ask Oscar AI">

      <div class="presence">
        <span class="presence-dot" aria-hidden="true">
          <span class="presence-core"></span>
          <span class="presence-ring"></span>
        </span>
        <span class="presence-label">Oscar Fanelli</span>
      </div>

      <h1>Do not panic.</h1>
      <p class="subhead">This machine utilizes the fundamental interconnectedness of my career to answer questions you didn't even know you had.</p>

      <form data-llm-form class="ask-field" autocomplete="off">
        <label class="sr-only" for="queryInput">Ask something about Oscar</label>
        <input id="queryInput" class="ask-input" name="q" type="text" maxlength="500" aria-describedby="askGhost" />
        <span class="ask-ghost" id="askGhost" aria-hidden="true">
          <span class="ghost-text"></span>
          <span class="ask-caret"></span>
        </span>
        <button class="ask-submit" type="submit" aria-label="Ask">Ask</button>
      </form>

    </section>
  </main>

  <div class="dock" aria-label="Page actions">
    <button class="dock-btn shuffle-btn" data-llm-shuffle type="button" aria-label="Shuffle to another style">
      <span class="shuffle-cards" aria-hidden="true"><i></i><i></i><i></i></span>
      <span class="dock-btn-text">Shuffle style</span>
    </button>
    <button class="dock-btn behind-trigger" data-llm-behind type="button">
      <span class="behind-q" aria-hidden="true">?</span>
      <span class="dock-btn-text">What's behind this?</span>
    </button>
  </div>

  <script src="../llm-hook.js"></script>
</body>
</html>

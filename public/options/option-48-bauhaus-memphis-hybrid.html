<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Option 48 — Memphis Hybrid</title>
  <style>
    :root { --card-bg: #ffffff; }

    * { box-sizing: border-box; }

    body {
      margin: 0; min-height: 100vh;
      display: grid; place-items: center;
      background: #f9f7ff; color: #1f1b2d;
      font-family: Inter, sans-serif; padding: 24px;
    }

    /* Memphis: bold border, playful geometric accents */
    .card {
      width: min(760px,100%);
      background: #fff;
      border: 3px solid #1f1b2d;
      padding: 26px;
      position: relative;
    }

    /* Memphis decorative shapes */
    .shapeA {
      position: absolute; width: 46px; height: 46px;
      border-radius: 50%; background: #00c2ff;
      top: -18px; right: 24px; pointer-events: none;
    }
    .shapeB {
      position: absolute; width: 80px; height: 10px;
      background: #ff3ea5; bottom: -8px; left: 24px;
      pointer-events: none;
    }

    h1 {
      font-size: clamp(2rem,5vw,3rem);
      line-height: 1; margin: 0 0 12px;
    }

    /* presence: plum Memphis label */
    .presence-label { color: #574f7d; }

    /* ask field: thick Memphis border */
    .ask-field {
      border: 2px solid #1f1b2d !important;
      border-radius: 0 !important;
    }
    .ask-field:focus-within { box-shadow: 4px 4px 0 #00c2ff; }

    /* submit: dark indigo Memphis */
    .ask-submit {
      background: #1f1b2d !important;
      color: #fff !important;
      border-radius: 0 !important;
      font-weight: 700;
    }
    .ask-submit:hover { background: #2e2840 !important; }
  </style>
</head>
<body data-llm-design="composite">
  <main style="display:grid;place-items:center;min-height:100dvh;padding:24px;width:100%">
    <section class="card" aria-label="Ask Oscar AI">
      <span class="shapeA" aria-hidden="true"></span>
      <span class="shapeB" aria-hidden="true"></span>

      <div class="presence">
        <span class="presence-dot" aria-hidden="true">
          <span class="presence-core"></span>
          <span class="presence-ring"></span>
        </span>
        <span class="presence-label">Oscar Fanelli</span>
      </div>

      <h1>Do not panic.</h1>
      <p class="subhead">This machine utilizes the fundamental interconnectedness of my career to answer questions you didn't even know you had.</p>

      <form data-llm-form class="ask-field" autocomplete="off">
        <label class="sr-only" for="queryInput">Ask something about Oscar</label>
        <input id="queryInput" class="ask-input" name="q" type="text" maxlength="500" aria-describedby="askGhost" />
        <span class="ask-ghost" id="askGhost" aria-hidden="true">
          <span class="ghost-text"></span>
          <span class="ask-caret"></span>
        </span>
        <button class="ask-submit" type="submit" aria-label="Ask">Ask</button>
      </form>

    </section>
  </main>

  <div class="dock" aria-label="Page actions">
    <button class="dock-btn shuffle-btn" data-llm-shuffle type="button" aria-label="Shuffle to another style">
      <span class="shuffle-cards" aria-hidden="true"><i></i><i></i><i></i></span>
      <span class="dock-btn-text">Shuffle style</span>
    </button>
    <button class="dock-btn behind-trigger" data-llm-behind type="button">
      <span class="behind-q" aria-hidden="true">?</span>
      <span class="dock-btn-text">What's behind this?</span>
    </button>
  </div>

  <script src="../llm-hook.js"></script>
</body>
</html>

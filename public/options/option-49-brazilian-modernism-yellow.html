<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Option 49 — Brazilian Modernism (Yellow)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500..800&family=IBM+Plex+Mono:wght@400;500&family=Spline+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Style 1 · The Guidebook ──────────────────────────────────
       Bold sans-serif editorial voice. A cream "page" card sits on a
       cream stage with a yellow offset block peeking out bottom-right.
       These rules re-skin the composite chat renderer (llm-hook.js):
       its injected <style> lands after this one, so every override is
       scoped under `.card` (or `.dock`) to win on specificity.        */
    :root {
      --bg-stage: #fbf4dc;
      --bg-card: #fffdf6;
      --bg-answer: #f3efe1;
      --yellow: #f4c81d;
      --ink: #1a1916;
      --ink-body: #56524a;
      --ink-muted: #9a958a;
      --ink-label: #9c8f4a;
      /* composite submit/dock surfaces read --card-bg */
      --card-bg: #fffdf6;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0; min-height: 100vh;
      display: grid; place-items: center;
      background: var(--bg-stage); color: var(--ink);
      font-family: 'Spline Sans', system-ui, sans-serif;
      padding: 24px;
    }

    main { display: grid; place-items: center; min-height: 100dvh; padding: 24px; width: 100%; }

    /* The page card + yellow offset block (a 0-blur shadow shifted +16,+16). */
    .card {
      position: relative;
      width: min(700px, 100%);
      background: var(--bg-card);
      border: 2px solid var(--ink);
      border-radius: 2px;
      padding: 30px 32px;
      box-shadow: 16px 16px 0 var(--yellow);
    }

    /* ── Header row: presence (left) + "answers live" (right) ── */
    .card .topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
    .card .presence { gap: 9px; margin: 0; }
    .card .presence-dot { width: 9px; height: 9px; }
    .card .presence-label {
      font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; font-weight: 500;
      letter-spacing: .13em; text-transform: uppercase; color: var(--ink); opacity: 1;
    }
    .card .live-label {
      font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; font-weight: 500;
      letter-spacing: .1em; text-transform: uppercase; color: var(--ink-label);
    }

    /* ── Headline (shrinks once the conversation begins) ── */
    .card h1 {
      font-family: 'Bricolage Grotesque', system-ui, sans-serif; font-weight: 800;
      font-size: 44px; line-height: .98; letter-spacing: -.025em;
      margin: 0 0 12px; color: var(--ink);
    }
    .card:has(.thread) h1 { font-size: 32px; line-height: 1; letter-spacing: -.02em; margin-bottom: 14px; }

    /* ── Caption (hidden once chat is active) ── */
    .card .subhead {  
      font-family: 'Spline Sans', sans-serif; font-size: 15px; line-height: 1.55;
      color: var(--ink-body); opacity: 1; max-width: 450px; margin: 0 0 22px;
    }
    .card:has(.thread) .subhead { display: none; }

    /* ── Input row ── */
    .card .ask-field {
      border: 2px solid var(--ink); border-radius: 2px; height: 56px;
      padding: 0 6px 0 16px; background: #fff;
      transition: box-shadow 160ms ease, transform 160ms ease;
    }
    /* On focus the field lifts onto a hard yellow offset block — the same
       16px,16px yellow shadow the card sits on, scaled down for the input. */
    .card .ask-field:focus-within { border-color: var(--ink); box-shadow: 5px 5px 0 var(--yellow); }
    .card:has(.thread) .ask-field { height: 52px; margin-bottom: 4px; }
    .card .ask-input { font-size: 15.5px; color: var(--ink); }
    .card .ask-ghost { left: 16px; right: 100px; font-size: 15.5px; opacity: 1; color: var(--ink-muted); }
    .card .ask-caret { width: 2px; height: 20px; background: var(--ink); }
    /* No display override here: the hook reveals the button only once the
       visitor has typed (`.ask-field.has-text .ask-submit`), like every
       other style. */
    .card .ask-submit {
      font-family: 'Bricolage Grotesque', system-ui, sans-serif; font-weight: 700; font-size: 14px;
      color: var(--bg-card); background: var(--ink); border-radius: 2px; height: 42px; padding: 0 20px;
    }
    .card:has(.thread) .ask-submit { height: 40px; padding: 0 18px; }

    /* ── Popular questions ── */
    .card .popular { margin: 22px 0 12px; }
    .card .popular-label {
      font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; font-weight: 500;
      letter-spacing: .14em; color: var(--ink-label); opacity: 1;
    }
    .card .popular-rule { background: rgba(26, 25, 22, .14); }

    /* ── Chips (popular + follow-up) ── */
    .card .chip {
      font-family: 'Spline Sans', sans-serif; font-size: 14px; font-weight: 500;
      color: var(--ink); background: transparent; border: 1px solid rgba(26, 25, 22, .28);
      border-radius: 100px; padding: 9px 15px;
    }
    .card .chip:hover { background: var(--bg-stage); border-color: var(--ink); }
    .card .chip.chip-sm { font-size: 13px; font-weight: 600; padding: 7px 13px; }

    /* ── You bubble ── */
    .card .turn-you { margin-top: 18px; }
    .card .turn-you .inner { max-width: 78%; }
    .card .you-label {
      font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; font-weight: 500;
      letter-spacing: .14em; color: var(--ink-label); opacity: 1; margin-bottom: 7px;
    }
    .card .you-bubble {
      font-family: 'Spline Sans', sans-serif; font-size: 15.5px; font-weight: 600; line-height: 1.5;
      color: var(--ink); background: #fff; border: 1.5px solid var(--ink);
      border-radius: 12px 12px 3px 12px; padding: 10px 15px;
    }

    /* ── Oscar AI answer block ── */
    .card .answer { margin-top: 16px; padding: 18px 20px 18px 22px; border-radius: 0; background: var(--bg-answer); }
    .card .answer.is-plain { background: transparent; padding: 14px 18px 14px 22px; }
    .card .answer-rule { left: 0; top: 0; bottom: 0; width: 5px; border-radius: 0; background: var(--ink); opacity: 1; }
    .card .answer-shimmer { left: 0; top: 0; bottom: 0; width: 5px; border-radius: 0; background: var(--ink); }
    .card .answer-head { gap: 9px; margin-bottom: 11px; }
    .card .answer-label {
      font-family: 'IBM Plex Mono', monospace; font-size: 11px; font-weight: 500;
      letter-spacing: .13em; color: var(--ink); opacity: 1;
    }
    .card .answer-flag {
      font-family: 'IBM Plex Mono', monospace; font-size: 10px; font-weight: 500;
      letter-spacing: .08em; text-transform: uppercase; color: var(--ink);
      border: 1.5px solid var(--ink); border-radius: 2px; padding: 2px 7px;
    }
    .card .answer-body { font-family: 'Spline Sans', sans-serif; font-size: 15.5px; line-height: 1.55; color: var(--ink); }
    .card .answer-source {
      font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: var(--ink-label);
      opacity: 1; text-transform: uppercase; margin-top: 12px;
    }
    .card .confidence-tag {
      font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; letter-spacing: .12em;
      color: var(--ink-body); opacity: 1; margin-top: 14px; padding-top: 13px;
      border-top: 1.5px solid rgba(26, 25, 22, .16);
    }
    .card .confidence-pct { font-weight: 500; }
    .card .answer-chips { gap: 8px; margin-top: 11px; }
    .card .answer-chips-loading { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--ink-body); opacity: 1; }

    /* ── Loading skeleton ── */
    .card .thinking-head { gap: 10px; margin-bottom: 14px; }
    .card .status-text { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--ink-body); opacity: 1; }
    .card .dotwave span { width: 5px; height: 5px; background: var(--ink); }
    .card .skeleton-line {
      height: 12px; border-radius: 6px;
      background: linear-gradient(90deg, rgba(26,25,22,.06) 25%, rgba(26,25,22,.14) 50%, rgba(26,25,22,.06) 75%);
      background-size: 200% 100%;
    }

    /* ── Footer + conversation actions ── */
    .card .footer {
      margin-top: 24px; padding-top: 15px; border-top: 1.5px solid rgba(26, 25, 22, .12);
      font-family: 'Spline Sans', sans-serif; font-size: 13px; color: var(--ink-body); opacity: 1;
    }
    .card .footer a, .card .footer-contact { color: var(--ink-body); opacity: 1; }
    .card .clear-btn {
      font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; letter-spacing: .1em;
      text-transform: uppercase; color: var(--ink-label); opacity: 1; text-decoration: none;
    }
    .card .clear-btn:hover { opacity: .7; }
    .card .earlier-bar, .card .convo-title { font-family: 'IBM Plex Mono', monospace; color: var(--ink-label); }

    /* ── Floating dock ── */
    .dock .dock-btn {
      font-family: 'Spline Sans', sans-serif; background: var(--bg-card);
      border: 1.5px solid var(--ink); color: var(--ink); border-radius: 100px;
    }
    .dock .behind-q { border-color: var(--ink); }
    .dock .shuffle-cards i { border-color: var(--ink); background: var(--bg-card); }
  </style>
</head>
<body data-llm-design="composite">
  <main>
    <section class="card" aria-label="Ask Oscar AI">

      <div class="topbar">
        <div class="presence">
          <span class="presence-dot" aria-hidden="true">
            <span class="presence-core"></span>
            <span class="presence-ring"></span>
          </span>
          <span class="presence-label">Oscar Fanelli</span>
        </div>
        <span class="live-label">answers live</span>
      </div>

      <h1>Do not panic.</h1>
      <p class="subhead">This machine runs on the fundamental interconnectedness of my career — ask it anything and watch the answer assemble itself.</p>

      <form data-llm-form class="ask-field" autocomplete="off">
        <label class="sr-only" for="queryInput">Ask something about Oscar</label>
        <input id="queryInput" class="ask-input" name="q" type="text" maxlength="500" aria-describedby="askGhost" />
        <span class="ask-ghost" id="askGhost" aria-hidden="true">
          <span class="ghost-text"></span>
          <span class="ask-caret"></span>
        </span>
        <button class="ask-submit" type="submit" aria-label="Ask">Ask →</button>
      </form>

    </section>
  </main>

  <div class="dock" aria-label="Page actions">
    <button class="dock-btn shuffle-btn" data-llm-shuffle type="button" aria-label="Shuffle to another style">
      <span class="shuffle-cards" aria-hidden="true"><i></i><i></i><i></i></span>
      <span class="dock-btn-text">Shuffle style</span>
    </button>
    <button class="dock-btn behind-trigger" data-llm-behind type="button">
      <span class="behind-q" aria-hidden="true">?</span>
      <span class="dock-btn-text">What's behind this?</span>
    </button>
  </div>

  <script src="../llm-hook.js"></script>
</body>
</html>

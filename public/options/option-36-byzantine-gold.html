<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Option 36 — Byzantine Gold</title>
  <style>
    :root { --card-bg: #2b1f38; }

    * { box-sizing: border-box; }

    body {
      margin: 0; min-height: 100vh;
      display: grid; place-items: center;
      background: #1a1322; color: #f7e9bf;
      font-family: Inter, sans-serif; padding: 24px;
    }

    .card {
      width: min(760px,100%);
      background: linear-gradient(180deg, #2b1f38, #1c1528);
      border: 2px solid #d4b165;
      padding: 28px;
      box-shadow: 0 18px 60px rgba(0,0,0,.45);
    }

    h1 {
      font-size: clamp(2rem,5vw,3.2rem);
      line-height: 1.03; margin: 0 0 12px;
      letter-spacing: .01em;
    }

    /* presence: gold mosaic label */
    .presence-label { color: #ddc689; letter-spacing: .18em; }
    .presence-core { background: #d4b165 !important; }
    .presence-ring { border-color: #d4b165 !important; }

    /* ask field: dark chapel with gold border */
    .ask-field {
      border-color: #b99853 !important;
      border-radius: 0 !important;
      background: #1a1322;
    }
    .ask-field:focus-within { border-color: #d4b165 !important; }
    .ask-input::placeholder { color: #bda771; }

    /* submit: gold */
    .ask-submit {
      background: #d4b165 !important;
      color: #1a1322 !important;
      border-radius: 0 !important;
      font-weight: 600;
    }
    .ask-submit:hover { background: #e4c278 !important; }

    /* dock: dark Byzantine */
    .dock-btn {
      background: #2b1f38 !important;
      border-color: #b99853 !important;
    }
  </style>
</head>
<body data-llm-design="composite">
  <main style="display:grid;place-items:center;min-height:100dvh;padding:24px;width:100%">
    <section class="card" aria-label="Ask Oscar AI">

      <div class="presence">
        <span class="presence-dot" aria-hidden="true">
          <span class="presence-core"></span>
          <span class="presence-ring"></span>
        </span>
        <span class="presence-label">Icon: Oscar Fanelli</span>
      </div>

      <h1>Curious about my work?</h1>
      <p class="subhead">You're talking to a digitalized version of me, trained on what I've built. Ask about a project, my process, or how I work — it answers live.</p>

      <form data-llm-form class="ask-field" autocomplete="off">
        <label class="sr-only" for="queryInput">Ask something about Oscar</label>
        <input id="queryInput" class="ask-input" name="q" type="text" maxlength="500" aria-describedby="askGhost" />
        <span class="ask-ghost" id="askGhost" aria-hidden="true">
          <span class="ghost-text"></span>
          <span class="ask-caret"></span>
        </span>
        <button class="ask-submit" type="submit" aria-label="Ask">Ask</button>
      </form>

    </section>
  </main>

  <div class="dock" aria-label="Page actions">
    <button class="dock-btn shuffle-btn" data-llm-shuffle type="button" aria-label="Shuffle to another style">
      <span class="shuffle-cards" aria-hidden="true"><i></i><i></i><i></i></span>
      <span class="dock-btn-text">Shuffle style</span>
    </button>
    <button class="dock-btn behind-trigger" data-llm-behind type="button">
      <span class="behind-q" aria-hidden="true">?</span>
      <span class="dock-btn-text">What's behind this?</span>
    </button>
  </div>

  <script src="../llm-hook.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Option 34 — Egyptian Revival</title>
  <style>
    :root { --card-bg: #221b12; }

    * { box-sizing: border-box; }

    body {
      margin: 0; min-height: 100vh;
      display: grid; place-items: center;
      background: linear-gradient(180deg, #1a1610, #2d2417 45%, #1a1610);
      color: #f4dfb1; font-family: Inter, sans-serif; padding: 24px;
    }

    .card {
      width: min(760px,100%);
      background: #221b12;
      border: 2px solid #c7a35a;
      padding: 26px;
    }

    h1 {
      font-size: clamp(2rem,5vw,3.2rem);
      margin: 0 0 12px; line-height: 1.02;
      letter-spacing: .01em;
    }

    /* presence: gold hieroglyphic label */
    .presence-label { color: #d9bd7f; letter-spacing: .2em; }
    .presence-core { background: #c7a35a !important; }
    .presence-ring { border-color: #c7a35a !important; }

    /* ask field: dark chamber with gold border */
    .ask-field {
      border-color: #9d7f45 !important;
      border-radius: 0 !important;
      background: #1a140d;
    }
    .ask-field:focus-within { border-color: #c7a35a !important; }
    .ask-input::placeholder { color: #b89f70; }

    /* submit: gold button with dark text */
    .ask-submit {
      background: #c7a35a !important;
      color: #1a140d !important;
      border-radius: 0 !important;
      font-weight: 600;
      letter-spacing: .04em;
    }
    .ask-submit:hover { background: #d4b165 !important; }

    /* dock: dark Egyptian */
    .dock-btn {
      background: #221b12 !important;
      border-color: #9d7f45 !important;
    }
  </style>
</head>
<body data-llm-design="composite">
  <main style="display:grid;place-items:center;min-height:100dvh;padding:24px;width:100%">
    <section class="card" aria-label="Ask Oscar AI">

      <div class="presence">
        <span class="presence-dot" aria-hidden="true">
          <span class="presence-core"></span>
          <span class="presence-ring"></span>
        </span>
        <span class="presence-label">Scribe: Oscar Fanelli</span>
      </div>

      <h1>Curious about my work?</h1>
      <p class="subhead">You're talking to a digitalized version of me, trained on what I've built. Ask about a project, my process, or how I work — it answers live.</p>

      <form data-llm-form class="ask-field" autocomplete="off">
        <label class="sr-only" for="queryInput">Ask something about Oscar</label>
        <input id="queryInput" class="ask-input" name="q" type="text" maxlength="500" aria-describedby="askGhost" />
        <span class="ask-ghost" id="askGhost" aria-hidden="true">
          <span class="ghost-text"></span>
          <span class="ask-caret"></span>
        </span>
        <button class="ask-submit" type="submit" aria-label="Ask">Enter</button>
      </form>

    </section>
  </main>

  <div class="dock" aria-label="Page actions">
    <button class="dock-btn shuffle-btn" data-llm-shuffle type="button" aria-label="Shuffle to another style">
      <span class="shuffle-cards" aria-hidden="true"><i></i><i></i><i></i></span>
      <span class="dock-btn-text">Shuffle style</span>
    </button>
    <button class="dock-btn behind-trigger" data-llm-behind type="button">
      <span class="behind-q" aria-hidden="true">?</span>
      <span class="dock-btn-text">What's behind this?</span>
    </button>
  </div>

  <script src="../llm-hook.js"></script>
</body>
</html>

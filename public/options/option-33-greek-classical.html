<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Option 33 — Greek Classical</title>
  <style>
    :root { --card-bg: #ffffff; }

    * { box-sizing: border-box; }

    body {
      margin: 0; min-height: 100vh;
      display: grid; place-items: center;
      background: #f5f6f8; color: #1b263b;
      font-family: Inter, sans-serif; padding: 24px;
    }

    /* Classical card with meander-border ornament at top and bottom */
    .card {
      width: min(760px,100%);
      background: #fff;
      border: 1px solid #d9dfe8;
      padding: 28px;
      position: relative;
    }
    .card::before, .card::after {
      content: '';
      position: absolute; left: 0; right: 0; height: 8px;
      background: repeating-linear-gradient(90deg, #1b263b 0 14px, #f5f6f8 14px 20px);
    }
    .card::before { top: 0; }
    .card::after { bottom: 0; }

    .inner { padding: 8px 0; }

    h1 {
      font-size: clamp(2rem,5vw,3.2rem);
      margin: 0 0 12px; line-height: 1.03;
      letter-spacing: -.01em;
    }

    /* presence: classical muted label */
    .presence-label { color: #4e5f79; }

    /* ask field: classical restrained border */
    .ask-field {
      border-color: #cfd8e6 !important;
      border-radius: 0 !important;
    }
    .ask-field:focus-within { border-color: #1b263b !important; }

    /* submit: classical dark */
    .ask-submit {
      background: #1b263b !important;
      color: #fff !important;
      border-radius: 0 !important;
    }
    .ask-submit:hover { background: #2a3a54 !important; }

    /* ── Harmonized conversation (classical) ──────────────────────────
       Restrained navy on marble, square corners, a slim navy rule.
       Scoped under `.card` to win over the renderer's rounded greys. */
    .card:has(.thread) h1 { font-size: clamp(1.5rem, 4vw, 2.2rem); }
    .card:has(.thread) .subhead { display: none; }

    .card .popular-label, .card .answer-label, .card .you-label { color: #4e5f79; letter-spacing: .2em; }
    .card .popular-rule, .card .convo-rule { background: #d9dfe8; }

    .card .chip { border-radius: 0; border: 1px solid #cfd8e6; background: transparent; color: #1b263b; }
    .card .chip:hover { background: #eef1f6; border-color: #1b263b; }

    .card .you-bubble { background: #eef1f6; border: 1px solid #d9dfe8; border-radius: 0; color: #1b263b; }

    .card .answer { background: #f8fafc; border: 1px solid #e3e8ef; border-radius: 0; }
    .card .answer.is-plain { background: transparent; border-color: transparent; }
    .card .answer-rule, .card .answer-shimmer { width: 3px; border-radius: 0; opacity: 1; background: #1b263b; }
    .card .answer-source { color: #4e5f79; font-style: italic; }
    .card .confidence-tag { border-top-color: #d9dfe8; color: #4e5f79; }
    .card .confidence-pct { color: #1b263b; }

    .card .dotwave span { background: #1b263b; }
    .card .status-text { color: #4e5f79; }
    .card .skeleton-line {
      border-radius: 0;
      background: linear-gradient(90deg, rgba(27,38,59,.05) 25%, rgba(27,38,59,.13) 50%, rgba(27,38,59,.05) 75%);
      background-size: 200% 100%;
    }

    .card .footer { border-top-color: #d9dfe8; }
    .card .footer a, .card .clear-btn { color: #1b263b; }
  </style>
</head>
<body data-llm-design="composite">
  <main style="display:grid;place-items:center;min-height:100dvh;padding:24px;width:100%">
    <section class="card" aria-label="Ask Oscar AI">
      <div class="inner">

        <div class="presence">
          <span class="presence-dot" aria-hidden="true">
            <span class="presence-core"></span>
            <span class="presence-ring"></span>
          </span>
          <span class="presence-label">Citizen: Oscar Fanelli</span>
        </div>

        <h1>Do not panic.</h1>
        <p class="subhead">This machine utilizes the fundamental interconnectedness of my career to answer questions you didn't even know you had.</p>

        <form data-llm-form class="ask-field" autocomplete="off">
          <label class="sr-only" for="queryInput">Ask something about Oscar</label>
          <input id="queryInput" class="ask-input" name="q" type="text" maxlength="500" aria-describedby="askGhost" />
          <span class="ask-ghost" id="askGhost" aria-hidden="true">
            <span class="ghost-text"></span>
            <span class="ask-caret"></span>
          </span>
          <button class="ask-submit" type="submit" aria-label="Ask">Ask</button>
        </form>

      </div>
    </section>
  </main>

  <div class="dock" aria-label="Page actions">
    <button class="dock-btn shuffle-btn" data-llm-shuffle type="button" aria-label="Shuffle to another style">
      <span class="shuffle-cards" aria-hidden="true"><i></i><i></i><i></i></span>
      <span class="dock-btn-text">Shuffle style</span>
    </button>
    <button class="dock-btn behind-trigger" data-llm-behind type="button">
      <span class="behind-q" aria-hidden="true">?</span>
      <span class="dock-btn-text">What's behind this?</span>
    </button>
  </div>

  <script src="../llm-hook.js"></script>
</body>
</html>

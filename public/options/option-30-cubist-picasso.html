<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Option 30 — Cubist (Picasso)</title>
  <style>
    :root { --card-bg: rgba(255,255,255,.85); }

    * { box-sizing: border-box; }

    body {
      margin: 0; min-height: 100vh;
      display: grid; place-items: center;
      background: #f8f4ea; padding: 24px;
      font-family: Inter, sans-serif; color: #1f1a17;
    }

    /* Cubist angular colour-block card */
    .card {
      width: min(760px,100%);
      padding: 26px;
      background: linear-gradient(135deg, #f3d8a7 0 22%, #e8c38f 22% 40%, #c7d7c8 40% 58%, #b4c6d8 58% 74%, #f2e6d0 74% 100%);
      border: 2px solid #3a3128;
    }

    .card .chip { font-size: 14px }

    /* Translucent overlay preserves text legibility */
    .overlay {
      background: rgba(255,255,255,.78);
      padding: 20px;
      border: 1px solid #3a3128;
    }

    h1 {
      font-size: clamp(2rem,5vw,3.1rem);
      line-height: 1.02; margin: 0 0 12px;
    }

    /* presence: earthen muted tone */
    .presence-label { color: #5b4a39; }

    /* ask field: cubist geometric */
    .ask-field {
      border-color: #3a3128 !important;
      border-radius: 0 !important;
      background: #fff;
    }
    .ask-field:focus-within { border-color: #c8860a !important; }

    /* submit: dark umber */
    .ask-submit {
      background: #3a3128 !important;
      color: #fff !important;
      border-radius: 0 !important;
    }
    .ask-submit:hover { background: #4e4338 !important; }

    /* ── Harmonized conversation (cubist) ─────────────────────────────
       Angular umber frames, a single ochre facet-rule on answers.
       Scoped under `.overlay` (the legible surface) to beat the renderer. */
    .overlay:has(.thread) h1 { font-size: clamp(1.5rem, 4vw, 2.2rem); }
    .overlay:has(.thread) .subhead { display: none; }

    .overlay .popular-label, .overlay .answer-label, .overlay .you-label { color: #5b4a39; letter-spacing: .16em; }
    .overlay .popular-rule, .overlay .convo-rule { background: #3a3128; }

    .overlay .chip { border-radius: 0; border: 1px solid #3a3128; background: transparent; color: #1f1a17; }
    .overlay .chip:hover { background: #f3d8a7; }

    .overlay .you-bubble { background: #fff; border: 1.5px solid #3a3128; border-radius: 0; color: #1f1a17; }

    .overlay .answer { background: rgba(255,255,255,.6); border: 1px solid #3a3128; border-radius: 0; }
    .overlay .answer.is-plain { background: transparent; border-color: transparent; }
    .overlay .answer-rule, .overlay .answer-shimmer { top: 0; bottom: 0; width: 5px; border-radius: 0; opacity: 1; background: #c8860a; }
    .overlay .answer-source { color: #5b4a39; }
    .overlay .confidence-tag { border-top-color: #3a3128; color: #5b4a39; }
    .overlay .confidence-pct { color: #c8860a; }

    .overlay .dotwave span { background: #c8860a; }
    .overlay .status-text { color: #5b4a39; }
    .overlay .skeleton-line {
      border-radius: 0;
      background: linear-gradient(90deg, rgba(58,49,40,.06) 25%, rgba(200,134,10,.22) 50%, rgba(58,49,40,.06) 75%);
      background-size: 200% 100%;
    }

    .overlay .footer { border-top-color: #3a3128; }
    .overlay .footer a, .overlay .clear-btn { color: #3a3128; }
  </style>
</head>
<body data-llm-design="composite">
  <main style="display:grid;place-items:center;min-height:100dvh;padding:24px;width:100%">
    <section class="card" aria-label="Ask Oscar AI">
      <div class="overlay">

        <div class="presence">
          <span class="presence-dot" aria-hidden="true">
            <span class="presence-core"></span>
            <span class="presence-ring"></span>
          </span>
          <span class="presence-label">Fragment: Oscar Fanelli</span>
        </div>

        <h1>Do not panic.</h1>
        <p class="subhead">This machine utilizes the fundamental interconnectedness of my career to answer questions you didn't even know you had.</p>

        <form data-llm-form class="ask-field" autocomplete="off">
          <label class="sr-only" for="queryInput">Ask something about Oscar</label>
          <input id="queryInput" class="ask-input" name="q" type="text" maxlength="500" aria-describedby="askGhost" />
          <span class="ask-ghost" id="askGhost" aria-hidden="true">
            <span class="ghost-text"></span>
            <span class="ask-caret"></span>
          </span>
          <button class="ask-submit" type="submit" aria-label="Ask">Ask</button>
        </form>

      </div>
    </section>
  </main>

  <div class="dock" aria-label="Page actions">
    <button class="dock-btn shuffle-btn" data-llm-shuffle type="button" aria-label="Shuffle to another style">
      <span class="shuffle-cards" aria-hidden="true"><i></i><i></i><i></i></span>
      <span class="dock-btn-text">Shuffle style</span>
    </button>
    <button class="dock-btn behind-trigger" data-llm-behind type="button">
      <span class="behind-q" aria-hidden="true">?</span>
      <span class="dock-btn-text">What's behind this?</span>
    </button>
  </div>

  <script src="../llm-hook.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Option 14 — Luxury Concierge</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Cormorant+Garamond:wght@500;600&display=swap" rel="stylesheet" />
  <style>
    :root { --card-bg: #ffffff; }

    * { box-sizing: border-box; }

    body {
      margin: 0; min-height: 100vh;
      display: grid; place-items: center;
      background:
        radial-gradient(circle at 20% 15%, #efe7dc 0, transparent 35%),
        radial-gradient(circle at 84% 82%, #e6edf9 0, transparent 30%),
        #f7f4ef;
      color: #191713; padding: 24px;
      font-family: Inter, sans-serif;
    }

    .card {
      width: min(780px,100%);
      background: rgba(255,255,255,.72);
      backdrop-filter: blur(8px);
      border: 1px solid #e6ddd1;
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 20px 55px rgba(34,28,20,.08);
    }

    h1 {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(2rem,5.5vw,3.8rem);
      margin: 0 0 12px; line-height: 1;
    }

    /* presence: warm luxury muted */
    .presence-label { color: #8a7b68; }

    /* ask field: elegant warm tone */
    .ask-field {
      border-color: #e5dccf !important;
      border-radius: 12px !important;
      background: #fff;
    }
    .ask-field:focus-within { border-color: #c4a988 !important; }

    /* submit: dark luxury */
    .ask-submit {
      background: #1d1a17 !important;
      color: #fff !important;
      border-radius: 9px !important;
      font-family: Inter, sans-serif;
      letter-spacing: .02em;
    }
    .ask-submit:hover { background: #2d2a27 !important; }

    /* ── Harmonized conversation (concierge) ──────────────────────────
       Restrained gold accents, hairline warm rules, a slim gilt answer
       rule. Scoped under `.card` to win over the renderer's greys. */
    .card:has(.thread) h1 { font-size: clamp(1.7rem, 4vw, 2.6rem); }
    .card:has(.thread) .subhead { display: none; }

    .card .popular-label, .card .answer-label, .card .you-label { color: #8a7b68; letter-spacing: .2em; }
    .card .popular-rule, .card .convo-rule { background: #e6ddd1; }

    .card .chip { border-color: #e0d4c3; background: transparent; color: #191713; }
    .card .chip:hover { background: #fff; border-color: #c4a988; }

    .card .you-bubble { background: rgba(196,169,136,.14); border: 1px solid #e6ddd1; border-radius: 14px 14px 4px 14px; color: #191713; }

    .card .answer { background: rgba(255,255,255,.55); border: 1px solid #ece4d8; border-radius: 14px; }
    .card .answer.is-plain { background: transparent; border-color: transparent; }
    .card .answer-rule, .card .answer-shimmer { width: 2px; opacity: 1; background: #c4a988; }
    .card .answer-source { color: #8a7b68; font-style: italic; }
    .card .confidence-tag { border-top-color: #e6ddd1; color: #8a7b68; }
    .card .confidence-pct { color: #c4a988; }

    .card .dotwave span { background: #c4a988; }
    .card .status-text { color: #8a7b68; }
    .card .skeleton-line {
      background: linear-gradient(90deg, rgba(196,169,136,.08) 25%, rgba(196,169,136,.24) 50%, rgba(196,169,136,.08) 75%);
      background-size: 200% 100%;
    }

    .card .footer { border-top-color: #e6ddd1; }
    .card .footer a, .card .clear-btn { color: #191713; }
  </style>
</head>
<body data-llm-design="composite">
  <main style="display:grid;place-items:center;min-height:100dvh;padding:24px;width:100%">
    <section class="card" aria-label="Ask Oscar AI">

      <div class="presence">
        <span class="presence-dot" aria-hidden="true">
          <span class="presence-core"></span>
          <span class="presence-ring"></span>
        </span>
        <span class="presence-label">Presenting Oscar Fanelli</span>
      </div>

      <h1>Do not panic.</h1>
      <p class="subhead">This machine utilizes the fundamental interconnectedness of my career to answer questions you didn't even know you had.</p>

      <form data-llm-form class="ask-field" autocomplete="off">
        <label class="sr-only" for="queryInput">Ask something about Oscar</label>
        <input id="queryInput" class="ask-input" name="q" type="text" maxlength="500" aria-describedby="askGhost" />
        <span class="ask-ghost" id="askGhost" aria-hidden="true">
          <span class="ghost-text"></span>
          <span class="ask-caret"></span>
        </span>
        <button class="ask-submit" type="submit" aria-label="Ask">Ask</button>
      </form>

    </section>
  </main>

  <div class="dock" aria-label="Page actions">
    <button class="dock-btn shuffle-btn" data-llm-shuffle type="button" aria-label="Shuffle to another style">
      <span class="shuffle-cards" aria-hidden="true"><i></i><i></i><i></i></span>
      <span class="dock-btn-text">Shuffle style</span>
    </button>
    <button class="dock-btn behind-trigger" data-llm-behind type="button">
      <span class="behind-q" aria-hidden="true">?</span>
      <span class="dock-btn-text">What's behind this?</span>
    </button>
  </div>

  <script src="../llm-hook.js"></script>
</body>
</html>

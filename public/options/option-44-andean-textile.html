<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Option 44 — Andean Textile</title>
  <style>
    :root { --card-bg: #ffffff; }

    * { box-sizing: border-box; }

    body {
      margin: 0; min-height: 100vh;
      display: grid; place-items: center;
      background: #f4efe6; color: #2f241b;
      font-family: Inter, sans-serif; padding: 24px;
    }

    .card {
      width: min(760px,100%);
      background: #fff;
      border: 2px solid #7a4b32;
      position: relative;
      overflow: hidden;
    }

    /* Andean colour band at top */
    .band {
      height: 10px;
      background: repeating-linear-gradient(90deg,
        #b23a2b 0 20px, #e59a32 20px 40px,
        #3c7c66 40px 60px, #3f5898 60px 80px);
    }

    .body { padding: 26px; }

    h1 {
      font-size: clamp(2rem,5vw,3rem);
      margin: 0 0 12px; line-height: 1;
    }

    /* presence: earthy woven label */
    .presence-label { color: #7a4b32; }

    /* ask field: warm loom-textured border */
    .ask-field {
      border-color: #d4b49f !important;
      border-radius: 0 !important;
    }
    .ask-field:focus-within { border-color: #7a4b32 !important; }

    /* submit: warm umber */
    .ask-submit {
      background: #7a4b32 !important;
      color: #fff !important;
      border-radius: 0 !important;
    }
    .ask-submit:hover { background: #935a3d !important; }

    /* ── Harmonized conversation (woven) ──────────────────────────────
       Loom language: square umber frames and an answer rule woven from
       the same band threads. Scoped under `.body` to beat the renderer. */
    .body:has(.thread) h1 { font-size: clamp(1.5rem, 4vw, 2.2rem); }
    .body:has(.thread) .subhead { display: none; }

    .body .popular-label, .body .answer-label, .body .you-label { color: #7a4b32; letter-spacing: .16em; }
    .body .popular-rule, .body .convo-rule { background: #7a4b32; }

    .body .chip { border-radius: 0; border: 1px solid #7a4b32; background: transparent; color: #2f241b; }
    .body .chip:hover { background: #f4efe6; }

    .body .you-bubble { background: #faf6ef; border: 1.5px solid #d4b49f; border-radius: 0; color: #2f241b; }

    .body .answer { background: #faf7f1; border: 1px solid #e3d3c4; border-radius: 0; }
    .body .answer.is-plain { background: transparent; border-color: transparent; }
    .body .answer-rule, .body .answer-shimmer {
      top: 0; bottom: 0; width: 7px; border-radius: 0; opacity: 1;
      background: repeating-linear-gradient(180deg, #b23a2b 0 10px, #e59a32 10px 20px, #3c7c66 20px 30px, #3f5898 30px 40px);
    }
    .body .answer-source { color: #7a4b32; }
    .body .confidence-tag { border-top-color: #e3d3c4; color: #7a4b32; }
    .body .confidence-pct { color: #b23a2b; }

    .body .dotwave span { background: #b23a2b; }
    .body .status-text { color: #7a4b32; }
    .body .skeleton-line {
      border-radius: 0;
      background: linear-gradient(90deg, rgba(122,75,50,.06) 25%, rgba(178,58,43,.20) 50%, rgba(122,75,50,.06) 75%);
      background-size: 200% 100%;
    }

    .body .footer { border-top-color: #e3d3c4; }
    .body .footer a, .body .clear-btn { color: #7a4b32; }
  </style>
</head>
<body data-llm-design="composite">
  <main style="display:grid;place-items:center;min-height:100dvh;padding:24px;width:100%">
    <section class="card" aria-label="Ask Oscar AI">
      <div class="band"></div>
      <div class="body">

        <div class="presence">
          <span class="presence-dot" aria-hidden="true">
            <span class="presence-core"></span>
            <span class="presence-ring"></span>
          </span>
          <span class="presence-label">Artesano: Oscar Fanelli</span>
        </div>

        <h1>Do not panic.</h1>
        <p class="subhead">This machine utilizes the fundamental interconnectedness of my career to answer questions you didn't even know you had.</p>

        <form data-llm-form class="ask-field" autocomplete="off">
          <label class="sr-only" for="queryInput">Ask something about Oscar</label>
          <input id="queryInput" class="ask-input" name="q" type="text" maxlength="500" aria-describedby="askGhost" />
          <span class="ask-ghost" id="askGhost" aria-hidden="true">
            <span class="ghost-text"></span>
            <span class="ask-caret"></span>
          </span>
          <button class="ask-submit" type="submit" aria-label="Ask">Ask</button>
        </form>

      </div>
    </section>
  </main>

  <div class="dock" aria-label="Page actions">
    <button class="dock-btn shuffle-btn" data-llm-shuffle type="button" aria-label="Shuffle to another style">
      <span class="shuffle-cards" aria-hidden="true"><i></i><i></i><i></i></span>
      <span class="dock-btn-text">Shuffle style</span>
    </button>
    <button class="dock-btn behind-trigger" data-llm-behind type="button">
      <span class="behind-q" aria-hidden="true">?</span>
      <span class="dock-btn-text">What's behind this?</span>
    </button>
  </div>

  <script src="../llm-hook.js"></script>
</body>
</html>

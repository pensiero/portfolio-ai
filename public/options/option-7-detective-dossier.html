<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Option 7 — Detective Dossier</title>
  <style>
    :root { --card-bg: #1b1714; }

    * { box-sizing: border-box; }

    body {
      margin: 0; min-height: 100vh;
      background: #12100f; color: #f2eadf;
      font-family: ui-monospace, Menlo, monospace;
      display: grid; place-items: center; padding: 20px;
    }

    .sheet {
      width: min(860px,100%);
      background: #1b1714;
      border: 1px solid #4a3f36;
      padding: 22px;
      box-shadow: 0 20px 80px rgba(0,0,0,.45);
    }

    .stamp {
      display: inline-block;
      border: 1px solid #c56b52; color: #e48a70;
      padding: 4px 8px;
      font-size: .72rem; letter-spacing: .1em; text-transform: uppercase;
      margin-bottom: 14px;
    }

    h1 { margin: 0 0 12px; font-size: clamp(1.5rem,4vw,2.4rem); }

    /* presence: sepia muted label */
    .presence-label { color: #b8a997; }
    .presence { margin-bottom: 12px; }

    /* ask field: dashed detective style */
    .ask-field {
      border: 1px dashed #635344 !important;
      border-radius: 0 !important;
      background: transparent;
    }
    .ask-field:focus-within { border-color: #e7c59d !important; }

    /* case number prefix */
    .case-prefix {
      color: #e7c59d; font-size: 13px; flex: none;
      padding-right: 8px; border-right: 1px dashed #635344; margin-right: 4px;
    }
    .ask-ghost { left: 82px !important; }

    /* submit: dossier-style */
    .ask-submit {
      background: #2c241f !important;
      color: #f2eadf !important;
      border: 1px solid #7f6a57 !important;
      border-radius: 0 !important;
      font-family: inherit;
      letter-spacing: .04em;
    }
    .ask-submit:hover { background: #3d3028 !important; }

    /* dock: dark dossier */
    .dock-btn {
      background: #1b1714 !important;
      border-color: #4a3f36 !important;
    }
  </style>
</head>
<body data-llm-design="composite">
  <main style="display:grid;place-items:center;min-height:100dvh;padding:20px;width:100%">
    <section class="sheet" aria-label="Ask Oscar AI">

      <div class="presence">
        <span class="stamp" style="margin-bottom:0;display:inline-flex;align-items:center;gap:8px">
          <span class="presence-dot" aria-hidden="true" style="position:relative;flex:none;width:10px;height:10px">
            <span class="presence-core"></span>
            <span class="presence-ring"></span>
          </span>
          Subject: Oscar Fanelli
        </span>
      </div>

      <h1>Do not panic.</h1>
      <p class="subhead">This machine utilizes the fundamental interconnectedness of my career to answer questions you didn't even know you had.</p>

      <form data-llm-form class="ask-field" autocomplete="off">
        <label class="sr-only" for="queryInput">Ask something about Oscar</label>
        <span class="case-prefix" aria-hidden="true">case#</span>
        <input id="queryInput" class="ask-input" name="q" type="text" maxlength="500" aria-describedby="askGhost" />
        <span class="ask-ghost" id="askGhost" aria-hidden="true">
          <span class="ghost-text"></span>
          <span class="ask-caret"></span>
        </span>
        <button class="ask-submit" type="submit" aria-label="Ask">investigate</button>
      </form>

    </section>
  </main>

  <div class="dock" aria-label="Page actions">
    <button class="dock-btn shuffle-btn" data-llm-shuffle type="button" aria-label="Shuffle to another style">
      <span class="shuffle-cards" aria-hidden="true"><i></i><i></i><i></i></span>
      <span class="dock-btn-text">Shuffle style</span>
    </button>
    <button class="dock-btn behind-trigger" data-llm-behind type="button">
      <span class="behind-q" aria-hidden="true">?</span>
      <span class="dock-btn-text">What's behind this?</span>
    </button>
  </div>

  <script src="../llm-hook.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Option 8 — Brutalist Mono</title>
  <style>
    :root { --card-bg: #ffffff; }

    * { box-sizing: border-box; }

    body {
      margin: 0; min-height: 100vh;
      background: #fff; color: #000;
      font-family: "Arial Black", Arial, sans-serif;
      display: grid; place-items: center; padding: 24px;
    }

    .box {
      width: min(980px,100%);
      border: 4px solid #000;
      padding: 24px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem,8vw,5rem);
      line-height: .92; text-transform: uppercase;
    }

    /* presence: bold and uppercase */
    .presence { margin-bottom: 10px; }
    .presence-label { font-size: 11px; letter-spacing: .2em; }

    /* subhead: normal weight override for legibility */
    .subhead { font-family: Arial, sans-serif; font-size: .95rem; font-weight: 400; }

    /* ask field: brutalist thick border */
    .ask-field {
      border: 3px solid #000 !important;
      border-radius: 0 !important;
      height: 56px !important;
    }
    .ask-field:focus-within { box-shadow: 4px 4px 0 #000; }
    .ask-input { font-family: monospace; font-size: 1rem; padding: 0 4px; }

    /* submit: black block */
    .ask-submit {
      background: #000 !important;
      color: #fff !important;
      border: none !important;
      border-radius: 0 !important;
      border-left: 3px solid #000 !important;
      font-family: "Arial Black", Arial, sans-serif;
      font-weight: 900;
      letter-spacing: .04em;
      text-transform: uppercase;
    }

    /* ── Harmonized conversation (brutalist) ──────────────────────────
       Everything square, hard 2px black frames, a fat ink rule, mono
       "typed" bubbles. Scoped under `.box` to beat the renderer. */
    .box:has(.thread) h1 { font-size: clamp(1.5rem, 5vw, 2.6rem); }
    .box:has(.thread) .subhead { display: none; }

    .box .popular-label, .box .answer-label, .box .you-label { color: #000; opacity: 1; font-weight: 700; letter-spacing: .2em; }
    .box .popular-rule, .box .convo-rule { background: #000; height: 2px; }

    .box .chip { border-radius: 0; border: 1.5px solid #000; background: transparent; color: #000; font-family: monospace; }
    .box .chip:hover { background: #000; color: #fff; }

    .box .you-bubble { background: #fff; border: 2px solid #000; border-radius: 0; color: #000; font-family: monospace; }

    .box .answer { background: #f4f4f4; border: 2px solid #000; border-radius: 0; }
    .box .answer.is-plain { background: transparent; }
    .box .answer-rule, .box .answer-shimmer { width: 6px; border-radius: 0; opacity: 1; background: #000; }
    .box .answer-body { font-family: Arial, sans-serif; font-weight: 400; }
    .box .answer-source { color: #000; opacity: .6; font-family: monospace; }
    .box .confidence-tag { border-top: 2px solid #000; color: #000; }
    .box .confidence-pct { color: #000; }

    .box .dotwave span { background: #000; }
    .box .status-text { color: #000; font-family: monospace; }
    .box .skeleton-line {
      border-radius: 0;
      background: linear-gradient(90deg, rgba(0,0,0,.07) 25%, rgba(0,0,0,.18) 50%, rgba(0,0,0,.07) 75%);
      background-size: 200% 100%;
    }

    .box .footer { border-top: 2px solid #000; }
    .box .footer a, .box .clear-btn { color: #000; }
  </style>
</head>
<body data-llm-design="composite">
  <main style="display:grid;place-items:center;min-height:100dvh;padding:24px;width:100%">
    <section class="box" aria-label="Ask Oscar AI">

      <div class="presence">
        <span class="presence-dot" aria-hidden="true">
          <span class="presence-core"></span>
          <span class="presence-ring"></span>
        </span>
        <span class="presence-label">OSCAR FANELLI</span>
      </div>

      <h1>Do not panic.</h1>
      <p class="subhead">This machine utilizes the fundamental interconnectedness of my career to answer questions you didn't even know you had.</p>

      <form data-llm-form class="ask-field" autocomplete="off">
        <label class="sr-only" for="queryInput">Ask something about Oscar</label>
        <input id="queryInput" class="ask-input" name="q" type="text" maxlength="500" aria-describedby="askGhost" />
        <span class="ask-ghost" id="askGhost" aria-hidden="true">
          <span class="ghost-text"></span>
          <span class="ask-caret"></span>
        </span>
        <button class="ask-submit" type="submit" aria-label="Ask">GO</button>
      </form>

    </section>
  </main>

  <div class="dock" aria-label="Page actions">
    <button class="dock-btn shuffle-btn" data-llm-shuffle type="button" aria-label="Shuffle to another style">
      <span class="shuffle-cards" aria-hidden="true"><i></i><i></i><i></i></span>
      <span class="dock-btn-text">Shuffle style</span>
    </button>
    <button class="dock-btn behind-trigger" data-llm-behind type="button">
      <span class="behind-q" aria-hidden="true">?</span>
      <span class="dock-btn-text">What's behind this?</span>
    </button>
  </div>

  <script src="../llm-hook.js"></script>
</body>
</html>

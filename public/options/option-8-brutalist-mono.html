<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Option 8 — Brutalist Mono</title>
  <style>
    :root { --card-bg: #ffffff; }

    * { box-sizing: border-box; }

    body {
      margin: 0; min-height: 100vh;
      background: #fff; color: #000;
      font-family: "Arial Black", Arial, sans-serif;
      display: grid; place-items: center; padding: 24px;
    }

    .box {
      width: min(980px,100%);
      border: 4px solid #000;
      padding: 24px;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(2rem,8vw,5rem);
      line-height: .92; text-transform: uppercase;
    }

    /* presence: bold and uppercase */
    .presence { margin-bottom: 10px; }
    .presence-label { font-size: 11px; letter-spacing: .2em; }

    /* subhead: normal weight override for legibility */
    .subhead { font-family: Arial, sans-serif; font-size: .95rem; font-weight: 400; }

    /* ask field: brutalist thick border */
    .ask-field {
      border: 3px solid #000 !important;
      border-radius: 0 !important;
      height: 56px !important;
    }
    .ask-field:focus-within { box-shadow: 4px 4px 0 #000; }
    .ask-input { font-family: monospace; font-size: 1rem; padding: 0 4px; }

    /* submit: black block */
    .ask-submit {
      background: #000 !important;
      color: #fff !important;
      border: none !important;
      border-radius: 0 !important;
      border-left: 3px solid #000 !important;
      font-family: "Arial Black", Arial, sans-serif;
      font-weight: 900;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
  </style>
</head>
<body data-llm-design="composite">
  <main style="display:grid;place-items:center;min-height:100dvh;padding:24px;width:100%">
    <section class="box" aria-label="Ask Oscar AI">

      <div class="presence">
        <span class="presence-dot" aria-hidden="true">
          <span class="presence-core"></span>
          <span class="presence-ring"></span>
        </span>
        <span class="presence-label">OSCAR FANELLI</span>
      </div>

      <h1>Curious about my work?</h1>
      <p class="subhead">You're talking to my digital twin, evolving as I grow.</p>

      <form data-llm-form class="ask-field" autocomplete="off">
        <label class="sr-only" for="queryInput">Ask something about Oscar</label>
        <input id="queryInput" class="ask-input" name="q" type="text" maxlength="500" aria-describedby="askGhost" />
        <span class="ask-ghost" id="askGhost" aria-hidden="true">
          <span class="ghost-text"></span>
          <span class="ask-caret"></span>
        </span>
        <button class="ask-submit" type="submit" aria-label="Ask">GO</button>
      </form>

    </section>
  </main>

  <div class="dock" aria-label="Page actions">
    <button class="dock-btn shuffle-btn" data-llm-shuffle type="button" aria-label="Shuffle to another style">
      <span class="shuffle-cards" aria-hidden="true"><i></i><i></i><i></i></span>
      <span class="dock-btn-text">Shuffle style</span>
    </button>
    <button class="dock-btn behind-trigger" data-llm-behind type="button">
      <span class="behind-q" aria-hidden="true">?</span>
      <span class="dock-btn-text">What's behind this?</span>
    </button>
  </div>

  <script src="../llm-hook.js"></script>
</body>
</html>

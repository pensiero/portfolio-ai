<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Option 3 — Terminal Dossier</title>
  <style>
    :root { --bg:#060606; --panel:#0c0c0c; --text:#b8ffcb; --muted:#67bd83; --line:#1f3d28; }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; background:var(--bg); color:var(--text); font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; display:grid; place-items:center; padding:18px; }
    .window { width:min(920px,100%); border:1px solid var(--line); background:var(--panel); box-shadow:0 0 0 1px #0a1a10 inset, 0 20px 60px rgba(0,0,0,.55); }
    .top { display:flex; gap:6px; padding:10px 12px; border-bottom:1px solid var(--line); }
    .dot { width:10px; height:10px; border-radius:50%; background:#1f3d28; }
    .body { padding:20px; }
    .line { color:var(--muted); margin-bottom:8px; }
    h1 { margin:8px 0 16px; font-size:clamp(1.4rem,3.4vw,2.1rem); font-weight:600; }
    .prompt { display:grid; grid-template-columns:auto 1fr auto; align-items:center; gap:10px; border:1px solid var(--line); padding:8px 10px; }
    .tag { color:var(--muted); }
    input { border:0; outline:0; background:transparent; color:var(--text); font:inherit; }
    button { border:1px solid var(--line); background:#0d1911; color:var(--text); font:inherit; padding:8px 12px; opacity:0; pointer-events:none; transition:opacity .2s ease; }
    button.show { opacity:1; pointer-events:auto; }
    .blink::after { content:'_'; animation:blink 1s steps(1) infinite; }
    @keyframes blink { 50% { opacity:0; } }
  
.style-shuffle{position:fixed;top:14px;right:14px;z-index:9999;font-size:.72rem;line-height:1;text-decoration:none;padding:6px 9px;border:1px solid currentColor;border-radius:999px;color:inherit;background:rgba(255,255,255,.08);opacity:.75;backdrop-filter:blur(2px)}
.style-shuffle:hover{opacity:1}
</style>
</head>
<body>
  <section class="window">
    <div class="top"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
    <div class="body">
      <div class="line">identity: Oscar Fanelli</div>
      <h1 class="blink">What do you want to know about me?</h1>
      <form data-llm-form class="prompt" id="f3">
        <span class="tag">query$</span>
        <input id="q3" placeholder="type question..." />
        <button id="b3" type="submit">run</button>
      </form>
    </div>
  </section>
  <a class="style-shuffle" href="../index.html" target="_top" aria-label="Shuffle style">shuffle style</a>

<script src="../llm-hook.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Option 25 — Retro Futurism</title>
  <style>
    :root { --card-bg: #ffffff; }

    * { box-sizing: border-box; }

    body {
      margin: 0; min-height: 100vh;
      display: grid; place-items: center;
      background: linear-gradient(180deg, #ffd6a5, #ffcad4 45%, #bde0fe);
      font-family: Inter, sans-serif; color: #2a1f35; padding: 24px;
    }

    .card {
      width: min(760px,100%);
      background: rgba(255,255,255,.8);
      border: 1px solid rgba(42,31,53,.2);
      border-radius: 18px; padding: 26px;
    }

    h1 {
      font-size: clamp(2rem,5vw,3.2rem);
      margin: 0 0 12px; line-height: 1;
      letter-spacing: -.02em;
    }

    /* presence: retro-purple muted label */
    .presence-label { color: #6b4f76; }

    /* ask field: rounded retro */
    .ask-field {
      border-color: rgba(42,31,53,.2) !important;
      border-radius: 12px !important;
      background: #fff;
    }
    .ask-field:focus-within { border-color: #2a1f35 !important; }

    /* submit: dark plum */
    .ask-submit {
      background: #2a1f35 !important;
      color: #fff !important;
      border-radius: 9px !important;
    }
    .ask-submit:hover { background: #3d2f4e !important; }

    /* ── Harmonized conversation (retro-future) ───────────────────────
       Glassy panels, a sunset peach→sky answer rule echoing the
       gradient. Scoped under `.card` to win over the renderer. */
    .card:has(.thread) h1 { font-size: clamp(1.5rem, 4vw, 2.2rem); }
    .card:has(.thread) .subhead { display: none; }

    .card .popular-label, .card .answer-label, .card .you-label { color: #6b4f76; letter-spacing: .16em; }

    .card .chip { border-color: rgba(42,31,53,.22); background: transparent; color: #2a1f35; }
    .card .chip:hover { background: #fff; border-color: #2a1f35; }

    .card .you-bubble { background: rgba(255,202,212,.5); border: 1px solid rgba(42,31,53,.12); border-radius: 14px 14px 4px 14px; color: #2a1f35; }

    .card .answer { background: rgba(255,255,255,.6); border: 1px solid rgba(42,31,53,.1); border-radius: 14px; }
    .card .answer.is-plain { background: transparent; border-color: transparent; }
    .card .answer-rule, .card .answer-shimmer { width: 3px; opacity: 1; background: linear-gradient(180deg, #ff8fab, #8ec5ff); }
    .card .answer-source { color: #6b4f76; }
    .card .confidence-tag { border-top-color: rgba(42,31,53,.14); color: #6b4f76; }
    .card .confidence-pct { color: #2a1f35; }

    .card .dotwave span { background: #6b4f76; }
    .card .status-text { color: #6b4f76; }
    .card .skeleton-line {
      background: linear-gradient(90deg, rgba(42,31,53,.05) 25%, rgba(255,143,171,.25) 50%, rgba(42,31,53,.05) 75%);
      background-size: 200% 100%;
    }

    .card .footer { border-top-color: rgba(42,31,53,.12); }
    .card .footer a, .card .clear-btn { color: #2a1f35; }
  </style>
</head>
<body data-llm-design="composite">
  <main style="display:grid;place-items:center;min-height:100dvh;padding:24px;width:100%">
    <section class="card" aria-label="Ask Oscar AI">

      <div class="presence">
        <span class="presence-dot" aria-hidden="true">
          <span class="presence-core"></span>
          <span class="presence-ring"></span>
        </span>
        <span class="presence-label">Transmission: Oscar Fanelli</span>
      </div>

      <h1>Do not panic.</h1>
      <p class="subhead">This machine utilizes the fundamental interconnectedness of my career to answer questions you didn't even know you had.</p>

      <form data-llm-form class="ask-field" autocomplete="off">
        <label class="sr-only" for="queryInput">Ask something about Oscar</label>
        <input id="queryInput" class="ask-input" name="q" type="text" maxlength="500" aria-describedby="askGhost" />
        <span class="ask-ghost" id="askGhost" aria-hidden="true">
          <span class="ghost-text"></span>
          <span class="ask-caret"></span>
        </span>
        <button class="ask-submit" type="submit" aria-label="Ask">Ask</button>
      </form>

    </section>
  </main>

  <div class="dock" aria-label="Page actions">
    <button class="dock-btn shuffle-btn" data-llm-shuffle type="button" aria-label="Shuffle to another style">
      <span class="shuffle-cards" aria-hidden="true"><i></i><i></i><i></i></span>
      <span class="dock-btn-text">Shuffle style</span>
    </button>
    <button class="dock-btn behind-trigger" data-llm-behind type="button">
      <span class="behind-q" aria-hidden="true">?</span>
      <span class="dock-btn-text">What's behind this?</span>
    </button>
  </div>

  <script src="../llm-hook.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Option 50 — The Manuscript</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,400..600;1,8..60,400..500&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Style 2 · The Manuscript ─────────────────────────────────
       Quiet, literary, all-serif. No card, no bubbles, no pills —
       the conversation reads like a typed interview transcript.
       These rules re-skin the composite chat renderer (llm-hook.js).
       Its injected <style> lands after this one, so overrides are
       scoped under `.card` (the bare page surface) / `.dock` to win
       on specificity. Hook-fixed copy ("Oscar AI", "popular
       questions", "You") is relabelled with font-size:0 + ::before. */
    :root {
      --bg-page: #faf9f4;
      --ink: #21201c;
      --ink-sub: #6b685f;
      --ink-muted: #a09c92;
      --ink-label: #8a8780;
      --rule-soft: rgba(33, 32, 28, .22);
      --card-bg: #faf9f4;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0; min-height: 100vh;
      display: grid; place-items: center;
      background: var(--bg-page); color: var(--ink);
      font-family: 'Source Serif 4', Georgia, serif;
      padding: 24px;
    }

    main { display: grid; place-items: center; min-height: 100dvh; padding: 24px; width: 100%; }

    /* The "page" — bare surface, no border, no offset, no shadow. */
    .card {
      position: relative;
      width: min(700px, 100%);
      background: var(--bg-page);
      border: none; border-radius: 0;
      padding: 52px 48px 44px;
      box-shadow: none;
    }

    /* ── Presence + kicker ── */
    .card .presence { gap: 9px; margin-bottom: 26px; }
    .card:has(.thread) .presence { margin-bottom: 20px; }
    .card .presence-dot { width: 8px; height: 8px; }
    .card .presence-label {
      font-family: 'Source Serif 4', serif; font-size: 12.5px; font-weight: 400;
      letter-spacing: .18em; text-transform: uppercase; color: var(--ink-label); opacity: 1;
    }

    /* ── Headline (weight 500, not bold; shrinks once chat begins) ── */
    .card h1 {
      font-family: 'Source Serif 4', serif; font-weight: 500;
      font-size: 46px; line-height: 1.03; letter-spacing: -.01em;
      color: var(--ink); margin: 0 0 14px;
    }
    .card:has(.thread) h1 { font-size: 34px; line-height: 1.05; margin-bottom: 18px; }

    /* ── Italic subhead (hidden once chat is active) ── */
    .card .subhead {
      font-family: 'Source Serif 4', serif; font-style: italic; font-size: 18px; line-height: 1.5;
      color: var(--ink-sub); opacity: 1; margin: 0 0 34px;
    }
    .card:has(.thread) .subhead { display: none; }

    /* ── Underline input — bottom rule only, no box, no real button ── */
    .card .ask-field {
      border: none; border-bottom: 1.5px solid var(--ink); border-radius: 0;
      height: auto; padding: 0 2px 11px; background: transparent; gap: 12px;
    }
    .card .ask-field:focus-within { box-shadow: none; }
    .card:has(.thread) .ask-field { margin-bottom: 28px; }
    .card .ask-input { font-family: 'Source Serif 4', serif; font-size: 19px; color: var(--ink); }
    .card .ask-ghost { left: 2px; right: 72px; top: 0; bottom: 11px; align-items: center; font-size: 19px; opacity: 1; color: var(--ink-muted); }
    .card:has(.thread) .ask-ghost { font-size: 18px; font-style: italic; }
    .card .ask-caret { width: 1.5px; height: 21px; background: var(--ink); }
    .card .ask-submit {
      display: block; background: transparent; border: none; box-shadow: none;
      font-family: 'Source Serif 4', serif; font-style: italic; font-size: 13px;
      color: var(--ink-muted); height: auto; padding: 0;
    }

    /* ── Starter questions — quiet serif underline links, not pills ── */
    .card .popular { display: block; margin: 24px 0 12px; }
    .card .popular-label { font-size: 0; opacity: 1; }
    .card .popular-label::before {
      content: "Or start here —"; font-family: 'Source Serif 4', serif; font-style: italic;
      font-size: 13px; letter-spacing: normal; text-transform: none; color: var(--ink-muted);
    }
    .card .popular-rule { display: none; }
    .card .chips { flex-direction: column; align-items: flex-start; gap: 11px; }

    /* ── Links shared by starters (.chip) and follow-ups (.chip-sm) ── */
    .card .chip {
      font-family: 'Source Serif 4', serif; font-size: 17px; font-weight: 400; color: var(--ink);
      background: transparent; border: none; border-bottom: 1px solid var(--rule-soft);
      border-radius: 0; padding: 0 0 3px; width: fit-content;
    }
    .card .chip:hover { background: transparent; border-bottom-color: var(--ink); }
    .card .chip.chip-sm { font-size: 16px; padding: 0 0 2px; }

    /* ── You — right-aligned, no bubble ── */
    .card .turn-you { margin-top: 6px; margin-bottom: 24px; }
    .card .turn-you .inner { max-width: 82%; }
    .card .you-label {
      font-family: 'Source Serif 4', serif; font-style: italic; font-size: 12.5px;
      letter-spacing: normal; text-transform: none; color: var(--ink-muted); opacity: 1; margin-bottom: 5px;
    }
    .card .you-label::after { content: " asked"; }
    .card .you-bubble {
      font-family: 'Source Serif 4', serif; font-size: 18px; font-weight: 400; line-height: 1.5;
      color: var(--ink); background: transparent; border: none; border-radius: 0; padding: 0; text-align: right;
    }

    /* ── Oscar — transcript style, thin left rule only ── */
    .card .answer { margin-top: 24px; padding: 0 0 0 20px; border-radius: 0; background: transparent; }
    .card .answer.is-plain { padding: 0 0 0 20px; }
    .card .answer-rule { left: 0; top: 3px; bottom: 3px; width: 1.5px; border-radius: 0; background: var(--ink); opacity: 1; }
    .card .answer.is-live .answer-rule { opacity: .4; }
    .card .answer-shimmer { left: 0; top: 3px; bottom: 3px; width: 1.5px; border-radius: 0; background: var(--ink); }
    .card .answer-head { margin-bottom: 10px; }
    .card .answer-label { font-size: 0; opacity: 1; }
    .card .answer-label::before {
      content: "Oscar"; font-family: 'Source Serif 4', serif; font-size: 12.5px;
      letter-spacing: .16em; text-transform: uppercase; color: var(--ink-label);
    }
    .card .answer-flag { display: none; }
    .card .answer-body { font-family: 'Source Serif 4', serif; font-size: 18px; line-height: 1.58; color: var(--ink); }
    .card .answer-source {
      font-family: 'Source Serif 4', serif; font-style: italic; font-size: 13.5px;
      color: var(--ink-label); opacity: 1; margin-top: 13px;
    }
    .card .confidence-tag {
      font-family: 'Source Serif 4', serif; font-style: italic; font-size: 13.5px;
      letter-spacing: normal; color: var(--ink-label); opacity: 1;
      border-top: none; margin-top: 4px; padding-top: 0;
    }
    .card .confidence-label { font-size: 13.5px; font-weight: 400; letter-spacing: normal; text-transform: none; }
    .card .confidence-pct { font-weight: 400; color: var(--ink-sub); }

    /* ── Follow-ups — "Follow that thread —" + underline links ── */
    .card .answer-chips { flex-direction: column; align-items: flex-start; gap: 9px; margin-top: 18px; }
    .card .answer-chips::before {
      content: "Follow that thread —"; display: block; font-family: 'Source Serif 4', serif;
      font-style: italic; font-size: 13px; color: var(--ink-muted);
    }
    .card .answer-chips-loading { font-family: 'Source Serif 4', serif; font-style: italic; font-size: 13px; color: var(--ink-muted); opacity: 1; }

    /* ── Loading — "Oscar" label + inline italic status, muted skeleton ── */
    .card .thinking-head { gap: 6px; margin-bottom: 12px; align-items: baseline; }
    .card .thinking-head .dotwave { display: none; }
    .card .status-text { font-family: 'Source Serif 4', serif; font-style: italic; font-size: 13px; color: var(--ink-muted); opacity: 1; }
    .card .status-text::before { content: "— "; }
    .card .skeleton-line {
      height: 14px; border-radius: 2px; animation-duration: 1.6s;
      background: linear-gradient(90deg, rgba(33,32,28,.05) 25%, rgba(33,32,28,.11) 50%, rgba(33,32,28,.05) 75%);
      background-size: 200% 100%;
    }

    /* ── Footer + conversation actions ── */
    .card .footer {
      margin-top: 38px; padding-top: 18px; border-top: 1px solid rgba(33, 32, 28, .1);
      font-family: 'Source Serif 4', serif; font-size: 13.5px; color: var(--ink-label); opacity: 1;
    }
    .card .footer a, .card .footer-contact { color: var(--ink-label); opacity: 1; }
    .card .clear-btn {
      font-family: 'Source Serif 4', serif; font-style: italic; font-size: 13.5px;
      color: var(--ink-label); opacity: 1; text-decoration: none;
    }
    .card .clear-btn:hover { opacity: .7; }
    .card .earlier-bar, .card .convo-title {
      font-family: 'Source Serif 4', serif; font-style: italic; color: var(--ink-label);
      text-transform: none; letter-spacing: normal;
    }

    /* ── Floating dock ── */
    .dock .dock-btn {
      font-family: 'Source Serif 4', serif; background: var(--bg-page);
      border: 1px solid rgba(33, 32, 28, .18); color: var(--ink); border-radius: 100px;
    }
    .dock .behind-q { border-color: var(--ink); }
    .dock .shuffle-cards i { border-color: var(--ink); background: var(--bg-page); }
  </style>
</head>
<body data-llm-design="composite">
  <main>
    <section class="card" aria-label="Ask Oscar AI">

      <div class="presence">
        <span class="presence-dot" aria-hidden="true">
          <span class="presence-core"></span>
          <span class="presence-ring"></span>
        </span>
        <span class="presence-label">Oscar Fanelli</span>
      </div>

      <h1>Do not panic.</h1>
      <p class="subhead">This machine utilizes the fundamental interconnectedness of my career to answer questions you didn't even know you had.</p>

      <form data-llm-form class="ask-field" autocomplete="off">
        <label class="sr-only" for="queryInput">Ask something about Oscar</label>
        <input id="queryInput" class="ask-input" name="q" type="text" maxlength="500" aria-describedby="askGhost" />
        <span class="ask-ghost" id="askGhost" aria-hidden="true">
          <span class="ghost-text"></span>
          <span class="ask-caret"></span>
        </span>
        <button class="ask-submit" type="submit" aria-label="Ask">press ↵</button>
      </form>

    </section>
  </main>

  <div class="dock" aria-label="Page actions">
    <button class="dock-btn shuffle-btn" data-llm-shuffle type="button" aria-label="Shuffle to another style">
      <span class="shuffle-cards" aria-hidden="true"><i></i><i></i><i></i></span>
      <span class="dock-btn-text">Shuffle style</span>
    </button>
    <button class="dock-btn behind-trigger" data-llm-behind type="button">
      <span class="behind-q" aria-hidden="true">?</span>
      <span class="dock-btn-text">What's behind this?</span>
    </button>
  </div>

  <script src="../llm-hook.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Option 27 — Pop Art</title>
  <style>
    :root { --card-bg: #ffffff; }

    * { box-sizing: border-box; }

    body {
      margin: 0; min-height: 100vh;
      display: grid; place-items: center;
      background: #fff200; color: #111;
      font-family: "Arial Black", Arial, sans-serif; padding: 24px;
    }

    .card {
      width: min(760px,100%);
      background: #fff;
      border: 4px solid #111;
      box-shadow: 12px 12px 0 #111;
      padding: 24px;
    }

    h1 {
      font-size: clamp(2rem,6vw,3.6rem);
      line-height: .92; margin: 0 0 10px;
    }

    /* presence: bold pop label */
    .presence-label { font-size: 10px; letter-spacing: .2em; }

    /* subhead: body-weight override */
    .subhead { font-family: Arial, sans-serif; font-weight: 400; font-size: .95rem; }

    /* ask field: thick black border pop */
    .ask-field {
      border: 3px solid #111 !important;
      border-radius: 0 !important;
      height: 56px !important;
    }
    .ask-field:focus-within { box-shadow: 4px 4px 0 #ff0054; }
    .ask-input { font-family: Arial, sans-serif; }

    /* submit: hot pink pop */
    .ask-submit {
      background: #ff0054 !important;
      color: #fff !important;
      border: none !important;
      border-radius: 0 !important;
      font-family: "Arial Black", Arial, sans-serif;
      font-weight: 900;
    }
    .ask-submit:hover { background: #e0004a !important; }

    /* ── Harmonized conversation (pop art) ────────────────────────────
       Comic-bold: 3px ink frames, hard offset shadows, a fat hot-pink
       rule. Scoped under `.card` to win over the renderer's greys. */
    .card:has(.thread) h1 { font-size: clamp(1.6rem, 5vw, 2.6rem); }
    .card:has(.thread) .subhead { display: none; }

    .card .popular-label, .card .answer-label, .card .you-label { color: #111; opacity: 1; font-weight: 900; letter-spacing: .14em; }
    .card .popular-rule, .card .convo-rule { background: #111; height: 3px; }

    .card .chip { border-radius: 0; border: 2px solid #111; background: transparent; color: #111; font-family: Arial, sans-serif; font-weight: 700; }
    .card .chip:hover { background: #ff0054; color: #fff; }

    .card .you-bubble { background: #fff200; border: 3px solid #111; border-radius: 0; color: #111; font-family: Arial, sans-serif; }

    .card .answer { background: #fff; border: 3px solid #111; border-radius: 0; box-shadow: 6px 6px 0 #111; }
    .card .answer.is-plain { background: transparent; box-shadow: none; }
    .card .answer-rule, .card .answer-shimmer { top: 0; bottom: 0; width: 8px; border-radius: 0; opacity: 1; background: #ff0054; }
    .card .answer-body { font-family: Arial, sans-serif; font-weight: 400; }
    .card .answer-source { color: #ff0054; font-weight: 900; }
    .card .confidence-tag { border-top: 3px solid #111; color: #111; }
    .card .confidence-pct { color: #ff0054; }

    .card .dotwave span { background: #ff0054; }
    .card .status-text { color: #111; font-family: Arial, sans-serif; }
    .card .skeleton-line {
      border-radius: 0;
      background: linear-gradient(90deg, rgba(17,17,17,.07) 25%, rgba(255,0,84,.25) 50%, rgba(17,17,17,.07) 75%);
      background-size: 200% 100%;
    }

    .card .footer { border-top: 3px solid #111; }
    .card .footer a, .card .clear-btn { color: #ff0054; }
  </style>
</head>
<body data-llm-design="composite">
  <main style="display:grid;place-items:center;min-height:100dvh;padding:24px;width:100%">
    <section class="card" aria-label="Ask Oscar AI">

      <div class="presence">
        <span class="presence-dot" aria-hidden="true">
          <span class="presence-core"></span>
          <span class="presence-ring"></span>
        </span>
        <span class="presence-label">OSCAR FANELLI</span>
      </div>

      <h1>Do not panic.</h1>
      <p class="subhead">This machine utilizes the fundamental interconnectedness of my career to answer questions you didn't even know you had.</p>

      <form data-llm-form class="ask-field" autocomplete="off">
        <label class="sr-only" for="queryInput">Ask something about Oscar</label>
        <input id="queryInput" class="ask-input" name="q" type="text" maxlength="500" aria-describedby="askGhost" />
        <span class="ask-ghost" id="askGhost" aria-hidden="true">
          <span class="ghost-text"></span>
          <span class="ask-caret"></span>
        </span>
        <button class="ask-submit" type="submit" aria-label="Ask">GO</button>
      </form>

    </section>
  </main>

  <div class="dock" aria-label="Page actions">
    <button class="dock-btn shuffle-btn" data-llm-shuffle type="button" aria-label="Shuffle to another style">
      <span class="shuffle-cards" aria-hidden="true"><i></i><i></i><i></i></span>
      <span class="dock-btn-text">Shuffle style</span>
    </button>
    <button class="dock-btn behind-trigger" data-llm-behind type="button">
      <span class="behind-q" aria-hidden="true">?</span>
      <span class="dock-btn-text">What's behind this?</span>
    </button>
  </div>

  <script src="../llm-hook.js"></script>
</body>
</html>

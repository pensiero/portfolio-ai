<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Option 46 — Dot Painting Inspired</title>
  <style>
    :root { --card-bg: #3a2b20; }

    * { box-sizing: border-box; }

    body {
      margin: 0; min-height: 100vh;
      display: grid; place-items: center;
      background: #2a1f17; color: #f5e7d0;
      font-family: Inter, sans-serif; padding: 24px;
    }

    .card {
      width: min(760px,100%);
      background: #3a2b20;
      border: 1px solid #c78c4b;
      padding: 26px;
      position: relative;
    }
    /* Dotted inner ceremonial border */
    .card::before {
      content: '';
      position: absolute; inset: 10px;
      border: 1px dotted #c78c4b;
      pointer-events: none;
    }

    h1 {
      font-size: clamp(2rem,5vw,3rem);
      margin: 0 0 12px; line-height: 1;
    }

    /* presence: warm ochre label */
    .presence-label { color: #e0b170; letter-spacing: .14em; }
    .presence-core { background: #c78c4b !important; }
    .presence-ring { border-color: #c78c4b !important; }

    /* ask field: earth ceremony tone */
    .ask-field {
      border-color: #c78c4b !important;
      border-radius: 0 !important;
      background: #2f241b;
    }
    .ask-field:focus-within { border-color: #e0b170 !important; }
    .ask-input::placeholder { color: #b99166; }

    /* submit: warm ochre */
    .ask-submit {
      background: #e0b170 !important;
      color: #2a1f17 !important;
      border-radius: 0 !important;
      font-weight: 600;
    }
    .ask-submit:hover { background: #d4a560 !important; }

    /* dock: dark earth */
    .dock-btn {
      background: #3a2b20 !important;
      border-color: #c78c4b !important;
    }

    /* ── Harmonized conversation (ceremony) ───────────────────────────
       Dotted ceremonial lines carry into the chat; an ochre answer rule
       on dark earth. Scoped under `.card` to win over the renderer. */
    .card:has(.thread) h1 { font-size: clamp(1.5rem, 4vw, 2.2rem); }
    .card:has(.thread) .subhead { display: none; }

    .card .popular-label, .card .answer-label, .card .you-label { color: #e0b170; letter-spacing: .16em; }
    .card .popular-rule, .card .convo-rule { height: 0; background: transparent; border-top: 1px dotted #c78c4b; }

    .card .chip { border-radius: 0; border: 1px dotted #c78c4b; background: transparent; color: #f5e7d0; }
    .card .chip:hover { background: rgba(199,140,75,.12); border-color: #e0b170; }

    .card .you-bubble { background: #2f241b; border: 1px dotted #c78c4b; border-radius: 0; color: #f5e7d0; }

    .card .answer { background: #33271d; border: 1px solid #5a4530; border-radius: 0; }
    .card .answer.is-plain { background: transparent; border-color: transparent; }
    .card .answer-rule, .card .answer-shimmer { width: 4px; border-radius: 0; opacity: 1; background: #c78c4b; }
    .card .answer-source { color: #b99166; }
    .card .confidence-tag { border-top: 1px dotted #5a4530; color: #b99166; }
    .card .confidence-pct { color: #e0b170; }

    .card .dotwave span { background: #e0b170; }
    .card .status-text { color: #b99166; }
    .card .skeleton-line {
      border-radius: 0;
      background: linear-gradient(90deg, rgba(199,140,75,.08) 25%, rgba(224,177,112,.24) 50%, rgba(199,140,75,.08) 75%);
      background-size: 200% 100%;
    }

    .card .footer { border-top: 1px dotted #5a4530; }
    .card .footer a, .card .clear-btn { color: #e0b170; }
  </style>
</head>
<body data-llm-design="composite">
  <main style="display:grid;place-items:center;min-height:100dvh;padding:24px;width:100%">
    <section class="card" aria-label="Ask Oscar AI">

      <div class="presence">
        <span class="presence-dot" aria-hidden="true">
          <span class="presence-core"></span>
          <span class="presence-ring"></span>
        </span>
        <span class="presence-label">Keeper: Oscar Fanelli</span>
      </div>

      <h1>Do not panic.</h1>
      <p class="subhead">This machine utilizes the fundamental interconnectedness of my career to answer questions you didn't even know you had.</p>

      <form data-llm-form class="ask-field" autocomplete="off">
        <label class="sr-only" for="queryInput">Ask something about Oscar</label>
        <input id="queryInput" class="ask-input" name="q" type="text" maxlength="500" aria-describedby="askGhost" />
        <span class="ask-ghost" id="askGhost" aria-hidden="true">
          <span class="ghost-text"></span>
          <span class="ask-caret"></span>
        </span>
        <button class="ask-submit" type="submit" aria-label="Ask">Ask</button>
      </form>

    </section>
  </main>

  <div class="dock" aria-label="Page actions">
    <button class="dock-btn shuffle-btn" data-llm-shuffle type="button" aria-label="Shuffle to another style">
      <span class="shuffle-cards" aria-hidden="true"><i></i><i></i><i></i></span>
      <span class="dock-btn-text">Shuffle style</span>
    </button>
    <button class="dock-btn behind-trigger" data-llm-behind type="button">
      <span class="behind-q" aria-hidden="true">?</span>
      <span class="dock-btn-text">What's behind this?</span>
    </button>
  </div>

  <script src="../llm-hook.js"></script>
</body>
</html>

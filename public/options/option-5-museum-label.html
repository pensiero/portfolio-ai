<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Option 5 — Museum Label</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap" rel="stylesheet" />
  <style>
    :root { --card-bg: #fbfaf7; }

    * { box-sizing: border-box; }

    body {
      margin: 0; min-height: 100vh;
      background: #fbfaf7; color: #1a1a1a;
      font-family: Inter, sans-serif;
      display: grid; place-items: center; padding: 32px;
    }

    .card { width: min(760px,100%); }

    h1 {
      font-family: Fraunces, serif;
      font-size: clamp(2rem,5.6vw,4rem);
      line-height: 1.05; margin: 0 0 12px;
    }

    /* ask field: museum-minimal underline style */
    .ask-field {
      border: none !important;
      border-bottom: 1px solid #d6d2c7 !important;
      border-radius: 0 !important;
      padding: 0 !important;
      height: 52px !important;
    }
    .ask-field:focus-within { border-bottom-color: #1a1a1a !important; }
    .ask-ghost { left: 0 !important; }
    .ask-input { padding: 8px 0; }

    /* submit: flat dark */
    .ask-submit {
      background: #1a1a1a !important;
      color: #fbfaf7 !important;
      border-radius: 6px !important;
      font-family: Inter, sans-serif;
      letter-spacing: .02em;
    }

    /* presence: catalog-muted */
    .presence-label { color: #7a776f; letter-spacing: .18em; }

    /* ── Harmonized conversation (gallery label) ──────────────────────
       Quiet hairline rules, a thin ink margin-rule for answers, no loud
       bubbles. Scoped under `.card` to win over the renderer's defaults. */
    .card:has(.thread) h1 { font-size: clamp(1.5rem, 4vw, 2.4rem); }
    .card:has(.thread) .subhead { display: none; }

    .card .popular-label, .card .answer-label, .card .you-label { color: #7a776f; letter-spacing: .18em; }
    .card .popular-rule, .card .convo-rule { background: #e4e0d6; }
    .card .popular { display: none }

    .card .chips { margin-top: 20px }

    .card .chip { font-size: 14px; border-radius: 8px; border-color: #d6d2c7; background: transparent; color: #d6d2c7; }
    .card .chip:hover { background: #f1efe8; border-color: #b9b4a7; }

    .card .you-bubble { background: #f3f1ea; border: 1px solid #e4e0d6; border-radius: 8px 8px 2px 8px; color: #1a1a1a; }

    .card .answer { background: transparent; padding: 4px 18px 4px 18px; }
    .card .answer-rule, .card .answer-shimmer { top: 2px; bottom: 2px; width: 2px; opacity: 1; background: #1a1a1a; }
    .card .answer-source { color: #7a776f; font-style: italic; }
    .card .confidence-tag { border-top-color: #e4e0d6; color: #7a776f; }
    .card .confidence-pct { color: #1a1a1a; }

    .card .dotwave span { background: #7a776f; }
    .card .status-text { color: #7a776f; }
    .card .skeleton-line {
      background: linear-gradient(90deg, rgba(26,26,26,.04) 25%, rgba(26,26,26,.10) 50%, rgba(26,26,26,.04) 75%);
      background-size: 200% 100%;
    }

    .card .footer { border-top-color: #e4e0d6; }
    .card .footer a, .card .clear-btn { color: #1a1a1a; }
  </style>
</head>
<body data-llm-design="composite">
  <main style="display:grid;place-items:center;min-height:100dvh;padding:32px;width:100%">
    <section class="card" aria-label="Ask Oscar AI">

      <div class="presence">
        <span class="presence-dot" aria-hidden="true">
          <span class="presence-core"></span>
          <span class="presence-ring"></span>
        </span>
        <span class="presence-label">Oscar Fanelli</span>
      </div>

      <h1>Do not panic.</h1>
      <p class="subhead">This machine utilizes the fundamental interconnectedness of my career to answer questions you didn't even know you had.</p>

      <form data-llm-form class="ask-field" autocomplete="off">
        <label class="sr-only" for="queryInput">Ask something about Oscar</label>
        <input id="queryInput" class="ask-input" name="q" type="text" maxlength="500" aria-describedby="askGhost" />
        <span class="ask-ghost" id="askGhost" aria-hidden="true">
          <span class="ghost-text"></span>
          <span class="ask-caret"></span>
        </span>
        <button class="ask-submit" type="submit" aria-label="Ask">Ask</button>
      </form>

    </section>
  </main>

  <div class="dock" aria-label="Page actions">
    <button class="dock-btn shuffle-btn" data-llm-shuffle type="button" aria-label="Shuffle to another style">
      <span class="shuffle-cards" aria-hidden="true"><i></i><i></i><i></i></span>
      <span class="dock-btn-text">Shuffle style</span>
    </button>
    <button class="dock-btn behind-trigger" data-llm-behind type="button">
      <span class="behind-q" aria-hidden="true">?</span>
      <span class="dock-btn-text">What's behind this?</span>
    </button>
  </div>

  <script src="../llm-hook.js"></script>
</body>
</html>

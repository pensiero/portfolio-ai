<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Option 5 — Museum Label</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap" rel="stylesheet" />
  <style>
    :root { --card-bg: #fbfaf7; }

    * { box-sizing: border-box; }

    body {
      margin: 0; min-height: 100vh;
      background: #fbfaf7; color: #1a1a1a;
      font-family: Inter, sans-serif;
      display: grid; place-items: center; padding: 32px;
    }

    .card { width: min(760px,100%); }

    h1 {
      font-family: Fraunces, serif;
      font-size: clamp(2rem,5.6vw,4rem);
      line-height: 1.05; margin: 0 0 12px;
    }

    /* ask field: museum-minimal underline style */
    .ask-field {
      border: none !important;
      border-bottom: 1px solid #d6d2c7 !important;
      border-radius: 0 !important;
      padding: 0 !important;
      height: 52px !important;
    }
    .ask-field:focus-within { border-bottom-color: #1a1a1a !important; }
    .ask-ghost { left: 0 !important; }
    .ask-input { padding: 8px 0; }

    /* submit: flat dark */
    .ask-submit {
      background: #1a1a1a !important;
      color: #fbfaf7 !important;
      border-radius: 6px !important;
      font-family: Inter, sans-serif;
      letter-spacing: .02em;
    }

    /* presence: catalog-muted */
    .presence-label { color: #7a776f; letter-spacing: .18em; }
  </style>
</head>
<body data-llm-design="composite">
  <main style="display:grid;place-items:center;min-height:100dvh;padding:32px;width:100%">
    <section class="card" aria-label="Ask Oscar AI">

      <div class="presence">
        <span class="presence-dot" aria-hidden="true">
          <span class="presence-core"></span>
          <span class="presence-ring"></span>
        </span>
        <span class="presence-label">Oscar Fanelli</span>
      </div>

      <h1>Curious about my work?</h1>
      <p class="subhead">You're talking to my digital twin, evolving as I grow.</p>

      <form data-llm-form class="ask-field" autocomplete="off">
        <label class="sr-only" for="queryInput">Ask something about Oscar</label>
        <input id="queryInput" class="ask-input" name="q" type="text" maxlength="500" aria-describedby="askGhost" />
        <span class="ask-ghost" id="askGhost" aria-hidden="true">
          <span class="ghost-text"></span>
          <span class="ask-caret"></span>
        </span>
        <button class="ask-submit" type="submit" aria-label="Ask">Ask</button>
      </form>

    </section>
  </main>

  <div class="dock" aria-label="Page actions">
    <button class="dock-btn shuffle-btn" data-llm-shuffle type="button" aria-label="Shuffle to another style">
      <span class="shuffle-cards" aria-hidden="true"><i></i><i></i><i></i></span>
      <span class="dock-btn-text">Shuffle style</span>
    </button>
    <button class="dock-btn behind-trigger" data-llm-behind type="button">
      <span class="behind-q" aria-hidden="true">?</span>
      <span class="dock-btn-text">What's behind this?</span>
    </button>
  </div>

  <script src="../llm-hook.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Option 35 — Mexican Muralist</title>
  <style>
    :root { --card-bg: rgba(255,248,232,.9); }

    * { box-sizing: border-box; }

    body {
      margin: 0; min-height: 100vh;
      display: grid; place-items: center;
      background: #f4ead7; color: #2a1f14;
      font-family: Inter, sans-serif; padding: 24px;
    }

    /* Muralist bold color-block card */
    .card {
      width: min(760px,100%);
      padding: 24px;
      background: linear-gradient(135deg, #d65f3a 0 25%, #f1bf54 25% 50%, #3f8f77 50% 75%, #2c4f8f 75% 100%);
      border: 2px solid #2a1f14;
    }

    .card .chip { font-size: 14px }

    /* Warm inner overlay for legibility */
    .inner {
      background: rgba(255,248,232,.88);
      padding: 20px;
      border: 1px solid #2a1f14;
    }

    h1 {
      font-size: clamp(2rem,5vw,3.2rem);
      line-height: 1.02; margin: 0 0 12px;
    }

    /* presence: warm earth muted label */
    .presence-label { color: #6e3a27; }

    /* ask field: earth tone border */
    .ask-field {
      border-color: #2a1f14 !important;
      border-radius: 0 !important;
      background: #fff;
    }
    .ask-field:focus-within { border-color: #d65f3a !important; }

    /* submit: dark umber */
    .ask-submit {
      background: #2a1f14 !important;
      color: #fff !important;
      border-radius: 0 !important;
    }
    .ask-submit:hover { background: #3d2e1e !important; }

    /* ── Harmonized conversation (muralist) ───────────────────────────
       Bold earth blocks: square umber frames, a terracotta→teal mural
       rule. Scoped under `.inner` (the legible panel) to beat the renderer. */
    .inner:has(.thread) h1 { font-size: clamp(1.5rem, 4vw, 2.2rem); }
    .inner:has(.thread) .subhead { display: none; }

    .inner .popular-label, .inner .answer-label, .inner .you-label { color: #6e3a27; letter-spacing: .16em; }
    .inner .popular-rule, .inner .convo-rule { background: #2a1f14; }

    .inner .chip { border-radius: 0; border: 1px solid #2a1f14; background: transparent; color: #2a1f14; }
    .inner .chip:hover { background: #f1bf54; }

    .inner .you-bubble { background: #fff; border: 1.5px solid #2a1f14; border-radius: 0; color: #2a1f14; }

    .inner .answer { background: rgba(255,248,232,.7); border: 1px solid #2a1f14; border-radius: 0; }
    .inner .answer.is-plain { background: transparent; border-color: transparent; }
    .inner .answer-rule, .inner .answer-shimmer { top: 0; bottom: 0; width: 6px; border-radius: 0; opacity: 1; background: linear-gradient(180deg, #d65f3a 0 50%, #3f8f77 50% 100%); }
    .inner .answer-source { color: #6e3a27; }
    .inner .confidence-tag { border-top-color: #2a1f14; color: #6e3a27; }
    .inner .confidence-pct { color: #d65f3a; }

    .inner .dotwave span { background: #d65f3a; }
    .inner .status-text { color: #6e3a27; }
    .inner .skeleton-line {
      border-radius: 0;
      background: linear-gradient(90deg, rgba(42,31,20,.06) 25%, rgba(214,95,58,.22) 50%, rgba(42,31,20,.06) 75%);
      background-size: 200% 100%;
    }

    .inner .footer { border-top-color: #2a1f14; }
    .inner .footer a, .inner .clear-btn { color: #6e3a27; }
  </style>
</head>
<body data-llm-design="composite">
  <main style="display:grid;place-items:center;min-height:100dvh;padding:24px;width:100%">
    <section class="card" aria-label="Ask Oscar AI">
      <div class="inner">

        <div class="presence">
          <span class="presence-dot" aria-hidden="true">
            <span class="presence-core"></span>
            <span class="presence-ring"></span>
          </span>
          <span class="presence-label">Artista: Oscar Fanelli</span>
        </div>

        <h1>Do not panic.</h1>
        <p class="subhead">This machine utilizes the fundamental interconnectedness of my career to answer questions you didn't even know you had.</p>

        <form data-llm-form class="ask-field" autocomplete="off">
          <label class="sr-only" for="queryInput">Ask something about Oscar</label>
          <input id="queryInput" class="ask-input" name="q" type="text" maxlength="500" aria-describedby="askGhost" />
          <span class="ask-ghost" id="askGhost" aria-hidden="true">
            <span class="ghost-text"></span>
            <span class="ask-caret"></span>
          </span>
          <button class="ask-submit" type="submit" aria-label="Ask">Ask</button>
        </form>

      </div>
    </section>
  </main>

  <div class="dock" aria-label="Page actions">
    <button class="dock-btn shuffle-btn" data-llm-shuffle type="button" aria-label="Shuffle to another style">
      <span class="shuffle-cards" aria-hidden="true"><i></i><i></i><i></i></span>
      <span class="dock-btn-text">Shuffle style</span>
    </button>
    <button class="dock-btn behind-trigger" data-llm-behind type="button">
      <span class="behind-q" aria-hidden="true">?</span>
      <span class="dock-btn-text">What's behind this?</span>
    </button>
  </div>

  <script src="../llm-hook.js"></script>
</body>
</html>

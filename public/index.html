<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio AI</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: #0b0b10;
      overflow: hidden;
    }
    #stage {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      background: transparent;
    }
    noscript {
      color: #e5e7eb;
      font-family: Inter, system-ui, sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <iframe id="stage" title="Portfolio style"></iframe>
  <noscript>Enable JavaScript to load the randomized style.</noscript>

  <script>
    // The option list is manifest-driven — adding a style means dropping a file
    // in options/ and adding one manifest entry. No edits here.
    const LAST_KEY = 'portfolio-last-style';

    async function loadRandomStyle() {
      const stage = document.getElementById('stage');
      try {
        const res = await fetch('options/manifest.json', { cache: 'no-cache' });
        const manifest = await res.json();
        const files = (manifest.options || []).map((o) => o.file).filter(Boolean);
        if (!files.length) throw new Error('No options in manifest');

        const prev = sessionStorage.getItem(LAST_KEY);
        let pool = files.slice();
        if (prev && pool.length > 1) pool = pool.filter((f) => f !== prev);

        const chosen = pool[Math.floor(Math.random() * pool.length)] || files[0];
        sessionStorage.setItem(LAST_KEY, chosen);
        stage.src = 'options/' + chosen;
      } catch (err) {
        // Fallback so the page is never blank if the manifest fails to load.
        stage.src = 'options/option-1-original.html';
        console.error('Failed to load manifest:', err);
      }
    }

    loadRandomStyle();

    // When a style page triggers the earthquake shuffle, pick a new random style.
    window.addEventListener('message', async (e) => {
      if (e.data?.type !== 'portfolio-shuffle') return;
      const stage = document.getElementById('stage');
      try {
        const res = await fetch('options/manifest.json', { cache: 'no-cache' });
        const manifest = await res.json();
        const files = (manifest.options || []).map((o) => o.file).filter(Boolean);
        if (!files.length) return;
        const current = sessionStorage.getItem(LAST_KEY);
        const pool = files.length > 1 ? files.filter((f) => f !== current) : files;
        const chosen = pool[Math.floor(Math.random() * pool.length)] || files[0];
        sessionStorage.setItem(LAST_KEY, chosen);
        stage.src = 'options/' + chosen;
      } catch {}
    });
  </script>
</body>
</html>
